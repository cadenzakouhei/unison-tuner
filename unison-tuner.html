<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Unison Tuner</title>
<style>
  :root {
    --bg: #0a0c0f; --panel: #111318; --border: #1e2330;
    --accent: #00e5ff; --green: #00ff88; --yellow: #ffdd00; --red: #ff3355;
    --text: #c8d0e0; --dim: #4a5568;
    --mono: monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px 12px 40px; }
  h1 { font-family: var(--mono); font-size: 1rem; color: var(--accent); letter-spacing: 0.15em; margin-bottom: 16px; }
  .grid { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; }
  .row { display: flex; align-items: center; gap: 10px; }
  button#mic-btn {
    font-family: var(--mono); font-size: 0.8rem; padding: 8px 18px;
    background: transparent; border: 1px solid var(--accent); color: var(--accent);
    border-radius: 3px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em;
  }
  button#mic-btn.on { background: var(--red); border-color: var(--red); color: #fff; }
  #msg { font-family: var(--mono); font-size: 0.65rem; color: var(--dim); flex: 1; }

/* level */
.lev-label { font-family: var(–mono); font-size: 0.6rem; color: var(–dim); display: flex; justify-content: space-between; margin-bottom: 4px; }
.lev-track { height: 14px; background: #0d0f14; border-radius: 3px; overflow: hidden; border: 1px solid var(–border); }
#lev-fill { height: 100%; width: 0%; background: var(–accent); border-radius: 3px; transition: width 0.04s; }

/* note */
.note-row { display: flex; justify-content: space-between; align-items: center; }
#note-name { font-family: var(–mono); font-size: 3rem; color: var(–accent); line-height: 1; }
.note-right { text-align: right; }
#freq-hz { font-family: var(–mono); font-size: 1.3rem; }
#freq-cents { font-family: var(–mono); font-size: 0.75rem; color: var(–dim); margin-top: 3px; }

/* harm */
.harm-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.harm-row span { font-family: var(–mono); font-size: 0.65rem; color: var(–dim); white-space: nowrap; }
.hbtn { font-family: var(–mono); font-size: 0.7rem; width: 36px; height: 28px; background: transparent; border: 1px solid var(–border); color: var(–dim); border-radius: 2px; cursor: pointer; }
.hbtn.sel { background: var(–yellow); border-color: var(–yellow); color: #000; font-weight: bold; }

/* verdict */
.verdict { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 13px; border-radius: 4px; background: var(–panel); border: 1px solid var(–border); transition: border-color 0.3s; }
.verdict.in { border-color: var(–green); }
.verdict.close { border-color: var(–yellow); }
.verdict.out { border-color: var(–red); }
.vdot { width: 18px; height: 18px; border-radius: 50%; background: var(–dim); transition: background 0.3s, box-shadow 0.3s; flex-shrink: 0; }
.verdict.in .vdot { background: var(–green); box-shadow: 0 0 16px var(–green); }
.verdict.close .vdot { background: var(–yellow); box-shadow: 0 0 10px var(–yellow); }
.verdict.out .vdot { background: var(–red); box-shadow: 0 0 8px var(–red); }
#vtext { font-family: var(–mono); font-size: 0.8rem; letter-spacing: 0.1em; }
.verdict.in #vtext { color: var(–green); }
.verdict.close #vtext { color: var(–yellow); }
.verdict.out #vtext { color: var(–red); }
#beat-disp { font-family: var(–mono); font-size: 0.95rem; color: var(–yellow); }
#beat-disp.zero { color: var(–green); }

/* sgram */
.sgram-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 4px; }
.slabel { font-family: var(–mono); font-size: 0.65rem; color: var(–dim); letter-spacing: 0.1em; text-transform: uppercase; }
#freq-range { font-family: var(–mono); font-size: 0.58rem; color: var(–dim); }
.sgram-wrap { position: relative; }
#sgram { width: 100%; height: 250px; display: block; background: #000; border-radius: 2px; }
.yaxis { position: absolute; right: 3px; top: 0; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 3px 0; pointer-events: none; }
.yaxis span { font-family: var(–mono); font-size: 0.48rem; color: rgba(255,255,255,0.4); background: rgba(0,0,0,0.6); padding: 1px 3px; border-radius: 2px; text-align: right; }
.yaxis span.sel { color: var(–yellow); }
.yaxis span.intune { color: var(–green); }

/* peaks */
#peaks { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.pchip { font-family: var(–mono); font-size: 0.6rem; padding: 2px 5px; border: 1px solid var(–border); border-radius: 2px; }
.pchip.fund { border-color: var(–accent); color: var(–accent); }
.pchip.sel { border-color: var(–yellow); color: var(–yellow); }
</style>

</head>
<body>
<h1>UNISON TUNER</h1>
<div class="grid">

  <div class="card row">
    <button id="mic-btn">▶ MIC ON</button>
    <span id="msg">タップしてマイクを起動</span>
  </div>

  <div class="card">
    <div class="lev-label"><span>INPUT LEVEL</span><span id="lev-num">0.0000</span></div>
    <div class="lev-track"><div id="lev-fill"></div></div>
  </div>

  <div class="card">
    <div class="note-row">
      <div id="note-name">—</div>
      <div class="note-right">
        <div id="freq-hz">— Hz</div>
        <div id="freq-cents">± — cents</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="harm-row">
      <span>倍音選択：</span>
      <div id="hbtns"></div>
    </div>
  </div>

  <div class="verdict out" id="verdict">
    <div class="vdot"></div>
    <span id="vtext">SIGNAL WAITING...</span>
    <span id="beat-disp">—</span>
  </div>

  <div class="card">
    <div class="sgram-hdr">
      <span class="slabel">SPECTROGRAM</span>
      <span id="freq-range">基音〜第8倍音</span>
    </div>
    <div class="sgram-wrap">
      <canvas id="sgram"></canvas>
      <div class="yaxis" id="yaxis"></div>
    </div>
  </div>

  <div class="card">
    <div class="slabel">DETECTED PARTIALS</div>
    <div id="peaks"><span style="color:var(--dim);font-size:0.6rem;font-family:monospace">—</span></div>
  </div>

</div>
<script>
// ── constants ────────────────────────────────────────────────
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const A4 = 440;
const FFTSIZE = 2048;  // small = fast on iOS
const COLS = 180;

// ── state ────────────────────────────────────────────────────
let ctx=null, analyser=null, stream=null, running=false;
let selHarm=4, lastBeat=0, smoothBeat=0, raf=null;
let envBuf=[], sgramBuf=[];
let f0=null, fMin=50, fMax=4000, throttle=0;

// ── DOM ──────────────────────────────────────────────────────
const micBtn   = document.getElementById(‘mic-btn’);
const msg      = document.getElementById(‘msg’);
const levFill  = document.getElementById(‘lev-fill’);
const levNum   = document.getElementById(‘lev-num’);
const noteName = document.getElementById(‘note-name’);
const freqHz   = document.getElementById(‘freq-hz’);
const freqCent = document.getElementById(‘freq-cents’);
const verdict  = document.getElementById(‘verdict’);
const vtext    = document.getElementById(‘vtext’);
const beatDisp = document.getElementById(‘beat-disp’);
const sgram    = document.getElementById(‘sgram’);
const gc       = sgram.getContext(‘2d’);
const yaxis    = document.getElementById(‘yaxis’);
const freqRange= document.getElementById(‘freq-range’);
const peaksEl  = document.getElementById(‘peaks’);

// ── harmonic buttons ─────────────────────────────────────────
const hbtns = document.getElementById(‘hbtns’);
hbtns.style.display=‘flex’; hbtns.style.gap=‘5px’; hbtns.style.flexWrap=‘wrap’;
for(let i=1;i<=8;i++){
const b=document.createElement(‘button’);
b.className=‘hbtn’+(i===selHarm?’ sel’:’’);
b.textContent=i===1?‘基音’:`${i}倍`;
b.onclick=()=>{selHarm=i;document.querySelectorAll(’.hbtn’).forEach((x,j)=>{x.className=‘hbtn’+(j+1===selHarm?’ sel’:’’);});};
hbtns.appendChild(b);
}

// ── canvas size ──────────────────────────────────────────────
function resize(){
sgram.width=sgram.offsetWidth*devicePixelRatio;
sgram.height=sgram.offsetHeight*devicePixelRatio;
}
window.addEventListener(‘resize’,()=>{resize();sgramBuf=[];});
resize();

// ── helpers ──────────────────────────────────────────────────
function f2note(f){
if(!f||f<=0)return{name:’—’,cents:0};
const m=12*Math.log2(f/A4)+69,mr=Math.round(m);
return{name:NOTES[((mr%12)+12)%12]+(Math.floor(mr/12)-1),cents:(m-mr)*100};
}

function peaks(fd,sr,fs,n=14){
const bHz=sr/fs,lo=Math.floor(27/bHz),hi=Math.min(fd.length-3,Math.floor(7000/bHz)),out=[];
for(let i=lo+2;i<hi-2;i++){
const v=fd[i];
if(v>fd[i-1]&&v>fd[i-2]&&v>fd[i+1]&&v>fd[i+2]&&v>20){
const p=fd[i-1],nx=fd[i+1],d=2*(2*v-p-nx);
out.push({f:(i+(d?((p-nx)/d):0))*bHz,a:v});
}
}
return out.sort((a,b)=>b.a-a.a).slice(0,n);
}

function fund(pks){
let best=null,bs=-1;
for(const p of pks.slice(0,8)){
if(p.f<27||p.f>4200)continue;
let sc=p.a;
for(const q of pks){const r=q.f/p.f,n=Math.round(r);if(n>=2&&n<=8&&Math.abs(r-n)/n<0.03)sc+=q.a*0.5;}
if(sc>bs){bs=sc;best=p.f;}
}
return best;
}

function beatEst(rms){
envBuf.push(rms);
if(envBuf.length>1024)envBuf.shift();
if(envBuf.length<64)return 0;
const N=Math.min(envBuf.length,256),sl=envBuf.slice(-N);
const mn=sl.reduce((a,b)=>a+b,0)/N;
let c=0;
for(let i=1;i<sl.length;i++)if((sl[i]-mn)*(sl[i-1]-mn)<0)c++;
const b=(c/2)/(N/60);
return b>0.08&&b<20?b:0;
}

// ── colormap ─────────────────────────────────────────────────
function cmap(v){
const n=Math.max(0,Math.min(1,v));
let r,g,b;
if(n<0.25){const t=n/0.25;r=0;g=0;b=Math.round(200*t);}
else if(n<0.5){const t=(n-0.25)/0.25;r=0;g=Math.round(220*t);b=200;}
else if(n<0.75){const t=(n-0.5)/0.25;r=Math.round(255*t);g=220;b=Math.round(200*(1-t));}
else{const t=(n-0.75)/0.25;r=255;g=Math.round(220*(1-t*0.8));b=0;}
return[r,g,b];
}

// ── selected line color ───────────────────────────────────────
function lineColor(beat){
if(beat<0.08)return{s:‘rgba(0,255,136,0.95)’,g:‘rgba(0,255,136,0.35)’,cls:‘intune’};
if(beat<1.5) return{s:‘rgba(255,221,0,0.95)’, g:‘rgba(255,221,0,0.3)’,  cls:‘sel’};
return             {s:‘rgba(255,51,85,0.95)’,  g:‘rgba(255,51,85,0.3)’,  cls:‘sel’};
}

// ── draw spectrogram ─────────────────────────────────────────
function drawSgram(fd,sr,fs){
const w=sgram.width,h=sgram.height;
const bHz=sr/fs;
const lo=Math.max(0,Math.floor(fMin/bHz));
const hi=Math.min(fd.length-1,Math.ceil(fMax/bHz));
const nb=hi-lo; if(nb<=0)return;

const col=new Float32Array(nb);
for(let i=0;i<nb;i++)col[i]=Math.max(0,(fd[lo+i]-5)/90);
sgramBuf.push(col);
if(sgramBuf.length>COLS)sgramBuf.shift();

gc.fillStyle=’#000’;gc.fillRect(0,0,w,h);
const cw=Math.max(1,w/COLS);
for(let ci=0;ci<sgramBuf.length;ci++){
const c=sgramBuf[ci];
const x=Math.round((ci/COLS)*w);
const pw=Math.max(1,Math.round(cw));
const img=gc.createImageData(pw,h);
const px=img.data;
for(let py=0;py<h;py++){
const ff=1-(py/h);
const bi=ff*(c.length-1);
const b0=Math.floor(bi),b1=Math.min(c.length-1,b0+1);
const val=c[b0]*(1-(bi-b0))+c[b1]*(bi-b0);
const[r,g,b]=cmap(val);
for(let dx=0;dx<pw;dx++){const idx=(py*pw+dx)*4;px[idx]=r;px[idx+1]=g;px[idx+2]=b;px[idx+3]=255;}
}
gc.putImageData(img,x,0);
}

// partial lines
if(f0){
const lc=lineColor(smoothBeat);
for(let n=1;n<=8;n++){
const freq=f0*n;
if(freq<fMin||freq>fMax)continue;
const ff=(freq-fMin)/(fMax-fMin);
const py=(1-ff)*h;
const isSel=n===selHarm;
if(isSel){
gc.save();
gc.strokeStyle=lc.g;gc.lineWidth=12*devicePixelRatio;
gc.shadowBlur=16*devicePixelRatio;gc.shadowColor=lc.s;
gc.beginPath();gc.moveTo(0,py);gc.lineTo(w,py);gc.stroke();
gc.strokeStyle=lc.s;gc.lineWidth=3.5*devicePixelRatio;gc.shadowBlur=0;
gc.beginPath();gc.moveTo(0,py);gc.lineTo(w,py);gc.stroke();
gc.restore();
} else {
gc.strokeStyle=‘rgba(255,255,255,0.2)’;gc.lineWidth=1.2*devicePixelRatio;
gc.setLineDash([4,5]);
gc.beginPath();gc.moveTo(0,py);gc.lineTo(w,py);gc.stroke();
gc.setLineDash([]);
gc.fillStyle=‘rgba(255,255,255,0.3)’;
gc.font=`${Math.round(8*devicePixelRatio)}px monospace`;
gc.textAlign=‘left’;gc.fillText(`P${n}`,3,py-3);
}
}
}
}

// ── update yaxis ─────────────────────────────────────────────
function updateYaxis(){
yaxis.innerHTML=’’;
if(!f0)return;
const lc=lineColor(smoothBeat);
for(let n=8;n>=1;n–){
const sp=document.createElement(‘span’);
sp.textContent=`P${n} ${(f0*n).toFixed(0)}`;
if(n===selHarm)sp.className=lc.cls;
yaxis.appendChild(sp);
}
}

// ── update peaks ─────────────────────────────────────────────
function updatePeaks(pks){
peaksEl.innerHTML=’’;
if(!pks.length){peaksEl.innerHTML=’<span style="color:var(--dim);font-size:0.6rem;font-family:monospace">—</span>’;return;}
[…pks].sort((a,b)=>a.f-b.f).slice(0,10).forEach(p=>{
const c=document.createElement(‘span’);c.className=‘pchip’;
if(f0&&Math.abs(p.f-f0)/f0<0.02)c.classList.add(‘fund’);
if(f0&&Math.abs(p.f/f0-selHarm)<0.03)c.classList.add(‘sel’);
c.textContent=`${p.f.toFixed(1)}Hz`;peaksEl.appendChild(c);
});
}

// ── main loop ─────────────────────────────────────────────────
function loop(){
if(!running)return;
raf=requestAnimationFrame(loop);

const fd=new Uint8Array(analyser.frequencyBinCount);
const td=new Uint8Array(analyser.fftSize);
analyser.getByteFrequencyData(fd);
analyser.getByteTimeDomainData(td);
const sr=ctx.sampleRate;

// RMS
let rms=0;
for(let i=0;i<td.length;i++){const s=(td[i]-128)/128;rms+=s*s;}
rms=Math.sqrt(rms/td.length);

// level meter
const pct=Math.min(100,rms*600);
levFill.style.width=pct+’%’;
levFill.style.background=pct>70?‘var(–red)’:pct>30?‘var(–yellow)’:‘var(–accent)’;
levNum.textContent=rms.toFixed(5);

// detect
const pks=peaks(fd,sr,FFTSIZE);
const detected=fund(pks);
if(detected&&rms>0.001){
f0=detected*0.9+( f0||detected)*0.1; // smooth
fMin=Math.max(20,f0*0.82);
fMax=f0*8*1.15;
const ni=f2note(f0);
noteName.textContent=ni.name;
freqHz.textContent=f0.toFixed(2)+’ Hz’;
freqCent.textContent=(ni.cents>=0?’+’:’’)+ni.cents.toFixed(1)+’ cents’;
freqCent.style.color=Math.abs(ni.cents)<5?‘var(–green)’:Math.abs(ni.cents)<15?‘var(–yellow)’:‘var(–red)’;
freqRange.textContent=`${fMin.toFixed(0)}〜${fMax.toFixed(0)} Hz`;
} else if(rms<0.0005){
noteName.textContent=’—’;freqHz.textContent=’— Hz’;freqCent.textContent=‘± — cents’;
}

// beat
const bRaw=beatEst(rms);
if(rms>0.001) lastBeat=lastBeat*0.88+bRaw*0.12; else lastBeat*=0.95;
smoothBeat=lastBeat;
const db=smoothBeat;

if(rms>0.001){
if(db<0.08){beatDisp.textContent=‘0.0 beat/s’;beatDisp.classList.add(‘zero’);}
else{beatDisp.textContent=db.toFixed(1)+’ beat/s’;beatDisp.classList.remove(‘zero’);}
} else {beatDisp.textContent=’—’;beatDisp.classList.remove(‘zero’);}

// verdict
if(rms<0.001){verdict.className=‘verdict out’;vtext.textContent=‘SIGNAL WAITING…’;}
else if(db<0.08){verdict.className=‘verdict in’;vtext.textContent=‘IN TUNE ✓’;}
else if(db<1.5){verdict.className=‘verdict close’;vtext.textContent=`BEAT ${db.toFixed(1)}/s — CLOSE`;}
else{verdict.className=‘verdict out’;vtext.textContent=`BEAT ${db.toFixed(1)}/s — ADJUST`;}

throttle++;
if(throttle>=2){throttle=0;drawSgram(fd,sr,FFTSIZE);}
updatePeaks(pks);
updateYaxis();
}

// ── mic ──────────────────────────────────────────────────────
micBtn.addEventListener(‘click’, async()=>{
if(running){ stop(); return; }

// iOS requires AudioContext created inside user gesture
try {
ctx = new (window.AudioContext||window.webkitAudioContext)();
} catch(e){ msg.textContent=’AudioContext error: ’+e.message; return; }

// resume if suspended (iOS quirk)
if(ctx.state===‘suspended’) await ctx.resume();

try {
stream = await navigator.mediaDevices.getUserMedia({
audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false },
video:false
});
} catch(e){ msg.textContent=’マイク拒否: ’+e.message; ctx.close(); ctx=null; return; }

analyser=ctx.createAnalyser();
analyser.fftSize=FFTSIZE;
analyser.smoothingTimeConstant=0.75;
analyser.minDecibels=-100;
analyser.maxDecibels=-5;

ctx.createMediaStreamSource(stream).connect(analyser);

running=true;
micBtn.textContent=‘■ STOP’;micBtn.classList.add(‘on’);
msg.textContent=‘解析中… ピアノを弾いてください’;
resize(); loop();
});

function stop(){
running=false; cancelAnimationFrame(raf);
if(stream) stream.getTracks().forEach(t=>t.stop());
if(ctx) ctx.close();
ctx=null; stream=null; analyser=null;
micBtn.textContent=‘▶ MIC ON’; micBtn.classList.remove(‘on’);
msg.textContent=‘タップしてマイクを起動’;
noteName.textContent=’—’; freqHz.textContent=’— Hz’; freqCent.textContent=‘± — cents’;
beatDisp.textContent=’—’; beatDisp.classList.remove(‘zero’);
verdict.className=‘verdict out’; vtext.textContent=‘SIGNAL WAITING…’;
levFill.style.width=‘0%’; levNum.textContent=‘0.0000’;
envBuf=[]; sgramBuf=[]; f0=null; lastBeat=0; smoothBeat=0;
gc.clearRect(0,0,sgram.width,sgram.height);
yaxis.innerHTML=’’; freqRange.textContent=‘基音〜第8倍音’;
}
</script>

</body>
</html>
