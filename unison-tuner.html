<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unison Tuner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap');
  :root {
    --bg: #0a0c0f; --panel: #111318; --border: #1e2330;
    --accent: #00e5ff; --green: #00ff88; --yellow: #ffdd00; --red: #ff3355;
    --text: #c8d0e0; --dim: #4a5568;
    --mono: 'Share Tech Mono', monospace; --sans: 'Zen Kaku Gothic New', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 16px 12px 40px; overflow-x: hidden;
  }
  header { width: 100%; max-width: 700px; display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  header h1 { font-family: var(--mono); font-size: 1.05rem; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; }
  header span { font-size: 0.68rem; color: var(--dim); letter-spacing: 0.1em; }
  .main-grid { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 12px; }

.status-bar { display: flex; align-items: center; gap: 10px; padding: 9px 14px; background: var(–panel); border: 1px solid var(–border); border-radius: 4px; }
#mic-btn { font-family: var(–mono); font-size: 0.73rem; letter-spacing: 0.1em; background: transparent; border: 1px solid var(–accent); color: var(–accent); padding: 6px 14px; border-radius: 2px; cursor: pointer; transition: background 0.2s, color 0.2s; text-transform: uppercase; }
#mic-btn:hover { background: var(–accent); color: var(–bg); }
#mic-btn.active { background: var(–red); border-color: var(–red); color: #fff; }
#status-text { font-family: var(–mono); font-size: 0.68rem; color: var(–dim); flex: 1; }

.note-display { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(–panel); border: 1px solid var(–border); border-radius: 4px; }
.note-name { font-family: var(–mono); font-size: 3rem; color: var(–accent); line-height: 1; min-width: 90px; }
.freq-info { text-align: right; }
.freq-hz { font-family: var(–mono); font-size: 1.4rem; color: var(–text); }
.freq-cents { font-family: var(–mono); font-size: 0.78rem; color: var(–dim); margin-top: 4px; }

.harmonic-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(–panel); border: 1px solid var(–border); border-radius: 4px; flex-wrap: wrap; }
.harmonic-row label { font-size: 0.68rem; color: var(–dim); font-family: var(–mono); white-space: nowrap; }
.harm-btns { display: flex; gap: 5px; flex-wrap: wrap; }
.harm-btn { font-family: var(–mono); font-size: 0.72rem; width: 36px; height: 30px; background: transparent; border: 1px solid var(–border); color: var(–dim); border-radius: 2px; cursor: pointer; transition: all 0.15s; }
.harm-btn:hover { border-color: var(–accent); color: var(–accent); }
.harm-btn.selected { background: var(–yellow); border-color: var(–yellow); color: #000; font-weight: bold; }

.verdict { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 14px; background: var(–panel); border: 1px solid var(–border); border-radius: 4px; transition: border-color 0.4s; }
.verdict.in-tune { border-color: var(–green); }
.verdict.close   { border-color: var(–yellow); }
.verdict.out     { border-color: var(–red); }
.verdict-dot { width: 20px; height: 20px; border-radius: 50%; background: var(–dim); transition: background 0.3s, box-shadow 0.3s; flex-shrink: 0; }
.verdict.in-tune .verdict-dot { background: var(–green); box-shadow: 0 0 18px var(–green); }
.verdict.close   .verdict-dot { background: var(–yellow); box-shadow: 0 0 12px var(–yellow); }
.verdict.out     .verdict-dot { background: var(–red); box-shadow: 0 0 8px var(–red); }
.verdict-text { font-family: var(–mono); font-size: 0.82rem; letter-spacing: 0.12em; color: var(–dim); transition: color 0.3s; }
.verdict.in-tune .verdict-text { color: var(–green); }
.verdict.close   .verdict-text { color: var(–yellow); }
.verdict.out     .verdict-text { color: var(–red); }
#beat-disp { font-family: var(–mono); font-size: 0.9rem; color: var(–yellow); }
#beat-disp.zero { color: var(–green); }

/* FFT Spectrum */
.spectrum-section { background: var(–panel); border: 1px solid var(–border); border-radius: 4px; padding: 12px 16px; }
.spectrum-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.section-label { font-family: var(–mono); font-size: 0.68rem; color: var(–dim); letter-spacing: 0.12em; text-transform: uppercase; }
.freq-range-label { font-family: var(–mono); font-size: 0.62rem; color: var(–dim); }
#spectrum-canvas { width: 100%; height: 280px; display: block; border-radius: 2px; background: #000; }

.peaks-section { background: var(–panel); border: 1px solid var(–border); border-radius: 4px; padding: 10px 14px; }
#peaks-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.peak-chip { font-family: var(–mono); font-size: 0.62rem; padding: 2px 6px; border: 1px solid var(–border); border-radius: 2px; color: var(–text); }
.peak-chip.fundamental { border-color: var(–accent); color: var(–accent); }
.peak-chip.selected-harm { border-color: var(–yellow); color: var(–yellow); }
</style>

</head>
<body>
<header>
  <h1>Unison Tuner</h1>
  <span>PIANO · 2-STRING BEAT DETECTOR</span>
</header>
<div class="main-grid">

  <div class="status-bar">
    <button id="mic-btn">▶ MIC ON</button>
    <span id="status-text">マイクをオンにして調律を開始</span>
  </div>

  <div class="note-display">
    <div class="note-name" id="note-name">—</div>
    <div class="freq-info">
      <div class="freq-hz" id="freq-hz">— Hz</div>
      <div class="freq-cents" id="freq-cents">± — cents</div>
    </div>
  </div>

  <div class="harmonic-row">
    <label>倍音選択：</label>
    <div class="harm-btns" id="harm-btns"></div>
  </div>

  <div class="verdict out" id="verdict">
    <div class="verdict-dot"></div>
    <span class="verdict-text" id="verdict-text">SIGNAL WAITING...</span>
    <span id="beat-disp">—</span>
  </div>

  <!-- FFT Spectrum with partial lines -->

  <div class="spectrum-section">
    <div class="spectrum-header">
      <span class="section-label">FFT SPECTRUM</span>
      <span class="freq-range-label" id="freq-range-label">基音〜第8倍音</span>
    </div>
    <canvas id="spectrum-canvas"></canvas>
  </div>

  <div class="peaks-section">
    <div class="section-label">DETECTED PARTIALS</div>
    <div id="peaks-list"><span style="color:var(--dim);font-family:var(--mono);font-size:0.62rem;">—</span></div>
  </div>

</div>
<script>
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const A4_FREQ = 440.0;
const FFT_SIZE = 8192;

let audioCtx=null, analyser=null, micStream=null;
let isRunning=false, selectedHarmonic=4;
let lastBeatHz=0, animFrame=null, smoothBeat=0;
let ampHistory=[], currentFundamental=null;
let fMin=50, fMax=4000, sgramThrottle=0;

const micBtn        = document.getElementById(‘mic-btn’);
const statusText    = document.getElementById(‘status-text’);
const noteNameEl    = document.getElementById(‘note-name’);
const freqHzEl      = document.getElementById(‘freq-hz’);
const freqCentsEl   = document.getElementById(‘freq-cents’);
const verdictEl     = document.getElementById(‘verdict’);
const verdictText   = document.getElementById(‘verdict-text’);
const beatDisp      = document.getElementById(‘beat-disp’);
const peaksList     = document.getElementById(‘peaks-list’);
const freqRangeLabel= document.getElementById(‘freq-range-label’);
const specCanvas    = document.getElementById(‘spectrum-canvas’);
const specCtx       = specCanvas.getContext(‘2d’);

// ── Harmonic buttons ─────────────────────────────────────────
const harmBtnsEl = document.getElementById(‘harm-btns’);
function updateHarmonicUI() {
document.querySelectorAll(’.harm-btn’).forEach((b,i)=>{
if(i+1===selectedHarmonic) b.classList.add(‘selected’); else b.classList.remove(‘selected’);
});
}
for(let i=1;i<=8;i++){
const b=document.createElement(‘button’);
b.className=‘harm-btn’+(i===selectedHarmonic?’ selected’:’’);
b.textContent=i===1?‘基音’:`${i}倍`;
b.addEventListener(‘click’,()=>{selectedHarmonic=i;updateHarmonicUI();});
harmBtnsEl.appendChild(b);
}

function resizeCanvas(){
specCanvas.width=specCanvas.offsetWidth*devicePixelRatio;
specCanvas.height=specCanvas.offsetHeight*devicePixelRatio;
}
window.addEventListener(‘resize’,resizeCanvas);
resizeCanvas();

function freqToNote(freq){
if(freq<=0)return{name:’—’,cents:0};
const midi=12*Math.log2(freq/A4_FREQ)+69,midiR=Math.round(midi);
return{name:NOTE_NAMES[((midiR%12)+12)%12]+(Math.floor(midiR/12)-1),cents:(midi-midiR)*100};
}

function detectPeaks(freqData,sampleRate,fftSize,topN=16){
const binHz=sampleRate/fftSize;
const minBin=Math.floor(20/binHz);
const maxBin=Math.min(freqData.length-3,Math.floor(8000/binHz));
const peaks=[];
for(let i=minBin+2;i<maxBin-2;i++){
const v=freqData[i];
if(v>freqData[i-1]&&v>freqData[i-2]&&v>freqData[i+1]&&v>freqData[i+2]&&v>20){
const prev=freqData[i-1],next=freqData[i+1],denom=2*(2*v-prev-next);
peaks.push({freq:(i+(denom!==0?(prev-next)/denom:0))*binHz,amp:v});
}
}
return peaks.sort((a,b)=>b.amp-a.amp).slice(0,topN);
}

function findFundamental(peaks){
if(!peaks.length)return null;
let bestFund=null,bestScore=-1;
for(const p of peaks.slice(0,8)){
const f0=p.freq;if(f0<20||f0>4200)continue;
let score=p.amp;
for(const q of peaks){const r=q.freq/f0,n=Math.round(r);if(n>=2&&n<=8&&Math.abs(r-n)/n<0.025)score+=q.amp*0.5;}
if(score>bestScore){bestScore=score;bestFund=f0;}
}
return bestFund;
}

function estimateBeat(rms){
ampHistory.push(rms);
if(ampHistory.length>1024)ampHistory.shift();
if(ampHistory.length<128)return 0;
const N=Math.min(ampHistory.length,512),sl=ampHistory.slice(-N);
const mn=sl.reduce((a,b)=>a+b,0)/N;
let c=0;
for(let i=1;i<sl.length;i++)if((sl[i]-mn)*(sl[i-1]-mn)<0)c++;
const b=(c/2)/(N/60);
return b>0.08&&b<20?b:0;
}

// ── Selected partial line color ───────────────────────────────
function lineColor(beat){
if(beat<0.08)return{stroke:‘rgba(0,255,136,1)’,  glow:‘rgba(0,255,136,0.5)’};
if(beat<1.5) return{stroke:‘rgba(255,221,0,1)’,  glow:‘rgba(255,221,0,0.45)’};
return             {stroke:‘rgba(255,51,85,1)’,   glow:‘rgba(255,51,85,0.45)’};
}

// ── Draw FFT spectrum with partial lines ──────────────────────
function drawSpectrum(freqData,sampleRate,fftSize){
const w=specCanvas.width,h=specCanvas.height;
specCtx.fillStyle=’#000’;specCtx.fillRect(0,0,w,h);

const binHz=sampleRate/fftSize;
const maxFreq=fMax||5000;
const maxBin=Math.min(freqData.length-1,Math.ceil(maxFreq/binHz));

// Grid lines
specCtx.strokeStyle=‘rgba(30,35,48,0.8)’;specCtx.lineWidth=1;
for(let f=500;f<=maxFreq;f+=500){
const x=(f/maxFreq)*w;
specCtx.beginPath();specCtx.moveTo(x,0);specCtx.lineTo(x,h);specCtx.stroke();
}

// Spectrum bars
for(let i=0;i<maxBin;i++){
const norm=Math.max(0,(freqData[i]-20)/80);
if(norm<=0)continue;
const x=(i*binHz/maxFreq)*w;
const bw=Math.max(1,w/maxBin);
specCtx.fillStyle=`rgba(0,229,255,${norm*0.7})`;
specCtx.fillRect(x,h-norm*h,bw,norm*h);
}

// Partial guide lines
if(currentFundamental){
const lc=lineColor(smoothBeat);
for(let n=1;n<=8;n++){
const freq=currentFundamental*n;
if(freq<=0||freq>maxFreq)continue;
const x=(freq/maxFreq)*w;
const isSel=n===selectedHarmonic;
if(isSel){
// thick glowing line for selected partial
specCtx.save();
specCtx.strokeStyle=lc.glow;
specCtx.lineWidth=16*devicePixelRatio;
specCtx.shadowBlur=20*devicePixelRatio;
specCtx.shadowColor=lc.stroke;
specCtx.beginPath();specCtx.moveTo(x,0);specCtx.lineTo(x,h);specCtx.stroke();
specCtx.strokeStyle=lc.stroke;
specCtx.lineWidth=4*devicePixelRatio;
specCtx.shadowBlur=0;
specCtx.beginPath();specCtx.moveTo(x,0);specCtx.lineTo(x,h);specCtx.stroke();
specCtx.restore();
// label
specCtx.fillStyle=lc.stroke;
specCtx.font=`bold ${Math.round(11*devicePixelRatio)}px monospace`;
specCtx.textAlign=‘center’;
specCtx.fillText(`P${n}`,x,20*devicePixelRatio);
} else {
specCtx.strokeStyle=‘rgba(255,255,255,0.25)’;
specCtx.lineWidth=1.5*devicePixelRatio;
specCtx.setLineDash([4,5]);
specCtx.beginPath();specCtx.moveTo(x,0);specCtx.lineTo(x,h);specCtx.stroke();
specCtx.setLineDash([]);
specCtx.fillStyle=‘rgba(255,255,255,0.4)’;
specCtx.font=`${Math.round(9*devicePixelRatio)}px monospace`;
specCtx.textAlign=‘center’;
specCtx.fillText(`P${n}`,x,20*devicePixelRatio);
}
}
}
}

function updatePeaksUI(peaks,fundamental){
peaksList.innerHTML=’’;
if(!peaks.length){peaksList.innerHTML=’<span style="color:var(--dim);font-family:var(--mono);font-size:0.62rem;">—</span>’;return;}
[…peaks].sort((a,b)=>a.freq-b.freq).slice(0,10).forEach(p=>{
const chip=document.createElement(‘span’);chip.className=‘peak-chip’;
if(fundamental&&Math.abs(p.freq-fundamental)/fundamental<0.02)chip.classList.add(‘fundamental’);
if(fundamental&&Math.abs(p.freq/fundamental-selectedHarmonic)<0.03)chip.classList.add(‘selected-harm’);
chip.textContent=`${p.freq.toFixed(1)}Hz`;peaksList.appendChild(chip);
});
}

function analyze(){
if(!isRunning)return;
animFrame=requestAnimationFrame(analyze);
const freqData=new Uint8Array(analyser.frequencyBinCount);
const timeData=new Uint8Array(analyser.fftSize);
analyser.getByteFrequencyData(freqData);
analyser.getByteTimeDomainData(timeData);
const sampleRate=audioCtx.sampleRate;

// RMS from ScriptProcessor if available, else timeData
let rms=0;
if(window._pcm){
for(let i=0;i<window._pcm.length;i++)rms+=window._pcm[i]*window._pcm[i];
rms=Math.sqrt(rms/window._pcm.length);
} else {
for(let i=0;i<timeData.length;i++){const s=(timeData[i]-128)/128;rms+=s*s;}
rms=Math.sqrt(rms/timeData.length);
}

const peaks=detectPeaks(freqData,sampleRate,FFT_SIZE);
const fundamental=findFundamental(peaks);

if(fundamental&&rms>0.0005){
currentFundamental=fundamental;
fMin=Math.max(20,fundamental*0.5);
fMax=fundamental*8.5;
const ni=freqToNote(fundamental);
noteNameEl.textContent=ni.name;
freqHzEl.textContent=fundamental.toFixed(2)+’ Hz’;
freqCentsEl.textContent=(ni.cents>=0?’+’:’’)+ni.cents.toFixed(1)+’ cents’;
freqCentsEl.style.color=Math.abs(ni.cents)<5?‘var(–green)’:Math.abs(ni.cents)<15?‘var(–yellow)’:‘var(–red)’;
freqRangeLabel.textContent=`${fMin.toFixed(0)}〜${fMax.toFixed(0)} Hz`;
} else if(rms<0.0002){
noteNameEl.textContent=’—’;freqHzEl.textContent=’— Hz’;freqCentsEl.textContent=‘± — cents’;
}

const beatHz=estimateBeat(rms);
if(rms>0.0005) lastBeatHz=lastBeatHz*0.85+beatHz*0.15; else lastBeatHz*=0.95;
smoothBeat=lastBeatHz;
const db=smoothBeat;

if(rms>0.0005){
if(db<0.08){beatDisp.textContent=‘0.0 beat/s’;beatDisp.classList.add(‘zero’);}
else{beatDisp.textContent=db.toFixed(1)+’ beat/s’;beatDisp.classList.remove(‘zero’);}
} else {beatDisp.textContent=’—’;beatDisp.classList.remove(‘zero’);}

if(rms<0.0005){verdictEl.className=‘verdict out’;verdictText.textContent=‘SIGNAL WAITING…’;}
else if(db<0.08){verdictEl.className=‘verdict in-tune’;verdictText.textContent=‘IN TUNE ✓’;}
else if(db<1.5){verdictEl.className=‘verdict close’;verdictText.textContent=`BEAT ${db.toFixed(1)}/s —`;}
else{verdictEl.className=‘verdict out’;verdictText.textContent=`BEAT ${db.toFixed(1)}/s —`;}

sgramThrottle++;
if(sgramThrottle>=2){sgramThrottle=0;drawSpectrum(freqData,sampleRate,FFT_SIZE);}
updatePeaksUI(peaks,fundamental);
}

micBtn.addEventListener(‘click’,async()=>{isRunning?stopMic():await startMic();});

async function startMic(){
try{
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
if(audioCtx.state===‘suspended’) await audioCtx.resume();
micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});
analyser=audioCtx.createAnalyser();
analyser.fftSize=FFT_SIZE;
analyser.smoothingTimeConstant=0.6;
analyser.minDecibels=-100;analyser.maxDecibels=-10;
const source=audioCtx.createMediaStreamSource(micStream);
source.connect(analyser);
const proc=audioCtx.createScriptProcessor(2048,1,1);
proc.onaudioprocess=(e)=>{
if(!isRunning)return;
const d=e.inputBuffer.getChannelData(0);
if(!window._pcm||window._pcm.length!==d.length)window._pcm=new Float32Array(d.length);
window._pcm.set(d);
};
source.connect(proc);
proc.connect(audioCtx.destination);
isRunning=true;
micBtn.textContent=‘■ MIC OFF’;micBtn.classList.add(‘active’);
statusText.textContent=‘解析中… ピアノを弾いてください’;
resizeCanvas();analyze();
}catch(e){statusText.textContent=’マイクアクセス拒否: ’+e.message;}
}

function stopMic(){
isRunning=false;cancelAnimationFrame(animFrame);
if(micStream)micStream.getTracks().forEach(t=>t.stop());
if(audioCtx)audioCtx.close();
audioCtx=null;micStream=null;analyser=null;window._pcm=null;
micBtn.textContent=‘▶ MIC ON’;micBtn.classList.remove(‘active’);
statusText.textContent=‘マイクをオンにして調律を開始’;
noteNameEl.textContent=’—’;freqHzEl.textContent=’— Hz’;freqCentsEl.textContent=‘± — cents’;
beatDisp.textContent=’—’;beatDisp.classList.remove(‘zero’);
verdictEl.className=‘verdict out’;verdictText.textContent=‘SIGNAL WAITING…’;
ampHistory=[];lastBeatHz=0;smoothBeat=0;currentFundamental=null;
specCtx.clearRect(0,0,specCanvas.width,specCanvas.height);
freqRangeLabel.textContent=‘基音〜第8倍音’;
}
</script>

</body>
</html>
