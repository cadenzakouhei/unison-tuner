<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mic Test</title>
<style>
body { background:#111; color:#fff; font-family:monospace; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:20px; padding:20px; }
button { font-size:1.2rem; padding:16px 32px; background:#00e5ff; color:#000; border:none; border-radius:6px; cursor:pointer; }
#log { width:100%; max-width:400px; background:#222; padding:12px; border-radius:6px; font-size:0.8rem; line-height:1.8; white-space:pre-wrap; }
#bar-wrap { width:100%; max-width:400px; background:#333; height:30px; border-radius:4px; overflow:hidden; }
#bar { height:100%; width:0%; background:#00ff88; transition:width 0.05s; }
</style>
</head>
<body>
<h2>🎤 Mic Test</h2>
<button id="btn">START</button>
<div id="bar-wrap"><div id="bar"></div></div>
<div id="log">ログ待機中...</div>

<script>
const btn = document.getElementById('btn');
const bar = document.getElementById('bar');
const log = document.getElementById('log');
let running = false, ctx = null, analyser = null, stream = null, raf = null;

function addLog(txt) {
  log.textContent += '\n' + txt;
}

btn.addEventListener('click', async () => {
  if (running) {
    running = false;
    cancelAnimationFrame(raf);
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (ctx) ctx.close();
    btn.textContent = 'START';
    addLog('停止しました');
    return;
  }

  addLog('AudioContext 作成中...');
  try {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    addLog('AudioContext OK: state=' + ctx.state + ' sr=' + ctx.sampleRate);
  } catch(e) {
    addLog('AudioContext エラー: ' + e.message);
    return;
  }

  if (ctx.state === 'suspended') {
    addLog('resume 試行...');
    await ctx.resume();
    addLog('resume後: state=' + ctx.state);
  }

  addLog('getUserMedia 試行...');
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    addLog('マイク取得OK! トラック数=' + stream.getAudioTracks().length);
  } catch(e) {
    addLog('マイクエラー: ' + e.message);
    return;
  }

  analyser = ctx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.5;
  analyser.minDecibels = -100;
  analyser.maxDecibels = -10;

  const src = ctx.createMediaStreamSource(stream);
  src.connect(analyser);
  addLog('analyser 接続OK');

  running = true;
  btn.textContent = 'STOP';
  addLog('解析開始 - 音を出してください');

  const td = new Uint8Array(analyser.fftSize);
  let frameCount = 0;

  function loop() {
    if (!running) return;
    raf = requestAnimationFrame(loop);
    analyser.getByteTimeDomainData(td);
    let rms = 0;
    for (let i = 0; i < td.length; i++) { const s = (td[i]-128)/128; rms += s*s; }
    rms = Math.sqrt(rms / td.length);
    bar.style.width = Math.min(100, rms * 500) + '%';
    frameCount++;
    if (frameCount % 60 === 0) {
      addLog(`frame ${frameCount}: RMS=${rms.toFixed(5)}`);
    }
  }
  loop();
});
</script>

</body>
</html>
