<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Unison Analyzer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
background: #111;
color: #fff;
font-family: -apple-system, ‘Helvetica Neue’, sans-serif;
min-height: 100dvh;
display: flex;
flex-direction: column;
font-size: 13px;
overflow-x: hidden;
}

/* ── Header ── */
#header {
background: #1a1a1a;
border-bottom: 1px solid #333;
padding: 8px 12px;
display: flex;
flex-direction: column;
gap: 6px;
}
#title-row {
display: flex;
align-items: center;
justify-content: center;
position: relative;
}
#app-title {
font-size: 17px;
font-weight: 600;
letter-spacing: 1px;
color: #fff;
}
#mic-btn {
position: absolute;
right: 0;
background: #2a0808;
border: 1.5px solid #882;
border-radius: 8px;
color: #f55;
font-size: 13px;
font-family: -apple-system, sans-serif;
padding: 6px 12px;
cursor: pointer;
-webkit-appearance: none;
transition: all 0.15s;
min-width: 90px;
text-align: center;
}
#mic-btn.on { background: #0a1a2a; border-color: #2255aa; color: #88aaff; }

/* Info bar */
#info-bar {
display: grid;
grid-template-columns: 1fr 2fr 1fr;
gap: 8px;
align-items: center;
}
.info-box {
background: #222;
border: 1px solid #333;
border-radius: 6px;
padding: 5px 8px;
}
.info-box .ib-label { font-size: 10px; color: #888; margin-bottom: 2px; }
#note-big { font-size: 28px; font-weight: bold; color: #fff; line-height: 1; }
#note-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

/* Tuning meter */
#tuning-box { text-align: center; }
#meter-wrap {
position: relative;
height: 16px;
background: linear-gradient(to right, #c00 0%, #880 30%, #0a0 48%, #0a0 52%, #880 70%, #c00 100%);
border-radius: 3px;
overflow: hidden;
margin: 3px 0;
}
#meter-scale {
position: absolute; top: 0; left: 0; right: 0; bottom: 0;
display: flex; justify-content: space-between; align-items: center;
padding: 0 4px; pointer-events: none;
}
#meter-scale span { font-size: 9px; color: rgba(255,255,255,0.7); }
#meter-needle {
position: absolute; top: 0; bottom: 0; width: 2px;
background: #fff; transform: translateX(-50%); left: 50%;
transition: left 0.1s; border-radius: 1px;
}
#cents-val { font-size: 12px; color: #aaa; }

/* Level meter */
#level-bar-wrap {
height: 14px; background: #000; border-radius: 3px;
overflow: hidden; margin: 3px 0; border: 1px solid #333;
}
#level-bar { height: 100%; width: 0%; background: linear-gradient(to right, #0c0, #aa0, #c00); transition: width 0.05s; }
#level-db { font-size: 11px; color: #aaa; text-align: right; }

/* ── Section label ── */
.section-label {
background: #1a1a1a;
border-top: 1px solid #333;
border-bottom: 1px solid #333;
padding: 4px 12px;
font-size: 11px;
color: #888;
display: flex;
justify-content: space-between;
align-items: center;
}

/* ── Harmonic select buttons ── */
#harmonic-select {
background: #161616;
border-bottom: 1px solid #2a2a2a;
padding: 6px 10px;
display: flex;
gap: 5px;
align-items: center;
}
#harmonic-select .hs-label {
font-size: 11px;
color: #666;
flex-shrink: 0;
margin-right: 2px;
}
.hs-btn {
flex: 1;
background: #1a1a1a;
border: 1.5px solid #2a2a2a;
border-radius: 6px;
color: #555;
font-size: 12px;
font-family: -apple-system, sans-serif;
padding: 6px 2px;
cursor: pointer;
-webkit-appearance: none;
text-align: center;
transition: all 0.15s;
user-select: none;
}
.hs-btn.selected {
background: #1a2a00;
border-color: #556600;
color: #ccff00;
}

/* ── Spectrogram panels ── */
#spectro-outer {
flex: 1;
display: flex;
overflow: hidden;
}
#spectro-wrap {
flex: 1;
display: flex;
flex-direction: column;
background: #000;
overflow: hidden;
}
.harmonic-row {
display: flex;
align-items: stretch;
border-bottom: 1px solid #1a1a1a;
flex: 1;
position: relative;
}
.hr-label {
width: 54px;
flex-shrink: 0;
background: #0d0d0d;
border-right: 1px solid #222;
display: flex;
flex-direction: column;
justify-content: center;
align-items: flex-start;
padding: 2px 6px;
}
.hr-label .hl-name { font-size: 12px; font-weight: 600; color: #ccc; }
.hr-label .hl-freq { font-size: 10px; color: #666; }
.hr-canvas-wrap {
flex: 1;
overflow: hidden;
position: relative;
}
.hr-canvas {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
}
/* Yellow border when selected */
.hr-canvas-wrap.selected::after {
content: ‘’;
position: absolute;
inset: 0;
border: 2px solid #ccff00;
pointer-events: none;
z-index: 2;
}
/* Green border on match */
.hr-canvas-wrap.match::after {
content: ‘’;
position: absolute;
inset: 0;
border: 2px solid #00ff55;
pointer-events: none;
z-index: 2;
}
/* Beat overlay inside panel */
.beat-overlay {
position: absolute;
top: 3px; right: 4px;
background: rgba(0,0,0,0.7);
border-radius: 4px;
padding: 1px 5px;
font-size: 12px;
font-weight: bold;
pointer-events: none;
display: none;
z-index: 3;
}

/* dB scale */
#db-scale {
width: 22px;
flex-shrink: 0;
display: flex;
flex-direction: column;
justify-content: space-between;
padding: 2px 0;
background: #000;
border-left: 1px solid #222;
}
#db-gradient {
width: 10px;
margin: 0 auto;
flex: 1;
background: linear-gradient(to bottom,
#ff0000 0%, #ff4400 10%, #ff8800 20%,
#ffcc00 30%, #aaff00 40%, #00ff44 50%,
#00aaff 65%, #0044ff 80%, #000066 100%);
border-radius: 2px;
}

/* ── Beat display bar ── */
#beat-bar {
background: #1a1a1a;
border-top: 1px solid #333;
padding: 6px 10px;
display: flex;
gap: 5px;
flex-wrap: wrap;
min-height: 58px;
align-items: center;
}
#beat-bar-empty {
font-size: 12px;
color: #444;
width: 100%;
text-align: center;
}
.beat-card {
flex: 1;
min-width: 56px;
background: #111;
border: 1px solid #2a2a2a;
border-radius: 6px;
padding: 4px 3px;
text-align: center;
transition: border-color 0.2s;
}
.beat-card .bc-h { font-size: 10px; color: #555; }
.beat-card .bc-val { font-size: 20px; font-weight: bold; line-height: 1.1; }
.beat-card .bc-unit { font-size: 9px; color: #555; }

/* ── Controls ── */
#controls {
background: #1a1a1a;
border-top: 1px solid #333;
padding: 8px 12px;
display: flex;
flex-direction: column;
gap: 8px;
}
.ctrl-row { display: flex; align-items: center; gap: 8px; }
.ctrl-label { font-size: 11px; color: #666; min-width: 84px; letter-spacing: 0.5px; }
.ctrl-row input[type=range] { flex: 1; accent-color: #3355cc; height: 22px; }
.ctrl-val { font-size: 12px; color: #888; min-width: 36px; text-align: right; }
</style>

</head>
<body>

<!-- Header -->

<div id="header">
  <div id="title-row">
    <span id="app-title">UNISON ANALYZER</span>
    <button id="mic-btn">🔇 MIC OFF</button>
  </div>
  <div id="info-bar">
    <div class="info-box">
      <div class="ib-label">Detected Note</div>
      <div id="note-big">—</div>
      <div id="note-sub" style="color:#444">— Hz</div>
    </div>
    <div class="info-box" id="tuning-box">
      <div class="ib-label" style="text-align:center">Tuning (cents)</div>
      <div id="meter-wrap">
        <div id="meter-scale">
          <span>-50</span><span>-25</span><span>0</span><span>+25</span><span>+50</span>
        </div>
        <div id="meter-needle"></div>
      </div>
      <div id="cents-val" style="text-align:center">— cent</div>
    </div>
    <div class="info-box">
      <div class="ib-label">Input Level</div>
      <div id="level-bar-wrap"><div id="level-bar"></div></div>
      <div id="level-db">— dB</div>
    </div>
  </div>
</div>

<!-- Section: FFT -->

<div class="section-label">
  <span>FFT / Spectrogram  (H1–H8)</span>
  <span id="sr-label">44100 Hz</span>
</div>

<!-- Harmonic select buttons -->

<div id="harmonic-select">
  <span class="hs-label">Select:</span>
</div>

<!-- Spectrogram + dB scale -->

<div id="spectro-outer">
  <div id="spectro-wrap"></div>
  <div id="db-scale">
    <div style="font-size:9px;color:#888;text-align:center;padding-top:2px;">0</div>
    <div id="db-gradient"></div>
    <div style="font-size:9px;color:#888;text-align:center;padding-bottom:2px;">-96</div>
  </div>
</div>

<!-- Beat display -->

<div class="section-label"><span>Beat Frequency — Selected Harmonics</span></div>
<div id="beat-bar"><span id="beat-bar-empty">Select a harmonic above to show beat frequency</span></div>

<!-- Controls -->

<div id="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">MIC GAIN</span>
    <input type="range" id="sl-gain" min="0.5" max="6" step="0.1" value="2.0">
    <span class="ctrl-val" id="vl-gain">2.0</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">SENSITIVITY</span>
    <input type="range" id="sl-sens" min="0.1" max="1.0" step="0.05" value="0.55">
    <span class="ctrl-val" id="vl-sens">0.55</span>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────
const NOTE_NAMES  = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FFT_SIZE    = 16384;   // larger = finer frequency resolution
const NUM_H       = 8;
const H_NAMES     = ["Fund.","2nd","3rd","4th","5th","6th","7th","8th"];
const BEAT_SMOOTH = 16;
const SCROLL_SPD  = 1;       // px per frame (logical)

// dB → RGB colour  (black→blue→cyan→green→yellow→red)
function dbToRGB(db) {
  const t = Math.max(0, Math.min(1, (db + 96) / 96));
  if (t < 0.20) { const s=t/0.20;       return [0,         Math.round(s*30),  Math.round(s*120)]; }
  if (t < 0.40) { const s=(t-0.20)/0.20;return [0,         Math.round(30+s*170), Math.round(120+s*80)]; }
  if (t < 0.60) { const s=(t-0.40)/0.20;return [0,         Math.round(200+s*55), Math.round(200-s*180)]; }
  if (t < 0.80) { const s=(t-0.60)/0.20;return [Math.round(s*255), 255,        Math.round(20-s*20)]; }
  {              const s=(t-0.80)/0.20;  return [255,       Math.round(255-s*220), 0]; }
}

// ── State ──────────────────────────────────────────────────
let micOn       = false;
let gainVal     = 2.0;
let sensVal     = 0.55;
let selH        = new Array(NUM_H).fill(false);
let beatHistory = Array.from({length:NUM_H}, ()=>[]);
let beatVals    = new Array(NUM_H).fill(null);
let statusVals  = new Array(NUM_H).fill(0);

let beatNullCount = new Array(NUM_H).fill(0);
const BEAT_NULL_THRESHOLD = 20; // frames before clearing

// Per-harmonic canvas refs
const panelWraps   = [];   // .hr-canvas-wrap div
const panelCanvases= [];   // visible canvas
const panelCtxs    = [];
const offscreens   = [];
const offCtxs      = [];
const hsBtns       = [];   // select buttons
const beatCards    = [];

// ── Build harmonic select buttons ─────────────────────────
const hSelWrap = document.getElementById("harmonic-select");
for (let h = 0; h < NUM_H; h++) {
  const btn = document.createElement("button");
  btn.className = "hs-btn";
  btn.textContent = "H" + (h+1);
  btn.addEventListener("click", ()=>toggleH(h));
  hSelWrap.appendChild(btn);
  hsBtns[h] = btn;
}

// ── Build spectrogram rows ─────────────────────────────────
const spectroWrap = document.getElementById("spectro-wrap");
for (let h = NUM_H-1; h >= 0; h--) {
  const row = document.createElement("div");
  row.className = "harmonic-row";
  row.style.minHeight = "50px";

  const lbl = document.createElement("div");
  lbl.className = "hr-label";
  lbl.innerHTML = `<span class="hl-name">${H_NAMES[h]}</span><span class="hl-freq" id="hf${h}">—</span>`;
  row.appendChild(lbl);

  const cw = document.createElement("div");
  cw.className = "hr-canvas-wrap";
  cw.id = `cw${h}`;

  const cv = document.createElement("canvas");
  cv.className = "hr-canvas";
  cv.id = `hc${h}`;
  cw.appendChild(cv);

  // Beat overlay
  const bo = document.createElement("div");
  bo.className = "beat-overlay";
  bo.id = `bo${h}`;
  cw.appendChild(bo);

  row.appendChild(cw);
  spectroWrap.appendChild(row);

  panelWraps[h]    = cw;
  panelCanvases[h] = cv;
}

// ── Build beat cards ───────────────────────────────────────
const beatBarEl = document.getElementById("beat-bar");
for (let h = 0; h < NUM_H; h++) {
  const card = document.createElement("div");
  card.className = "beat-card";
  card.id = `bcard${h}`;
  card.style.display = "none";
  card.innerHTML = `<div class="bc-h">H${h+1}</div><div class="bc-val" id="bcv${h}" style="color:#888">—</div><div class="bc-unit">beat/s</div>`;
  beatBarEl.appendChild(card);
  beatCards[h] = card;
}

// ── Init offscreen canvases ────────────────────────────────
function initOffscreens() {
  const dpr = window.devicePixelRatio || 1;
  for (let h = 0; h < NUM_H; h++) {
    const cv = panelCanvases[h];
    const w  = Math.max(cv.clientWidth,  200);
    const hh = Math.max(cv.clientHeight, 50);
    cv.width  = w  * dpr;
    cv.height = hh * dpr;
    panelCtxs[h] = cv.getContext("2d");

    const off = document.createElement("canvas");
    off.width  = w  * dpr;
    off.height = hh * dpr;
    offscreens[h] = off;
    offCtxs[h]    = off.getContext("2d");
    offCtxs[h].fillStyle = "#000";
    offCtxs[h].fillRect(0, 0, off.width, off.height);
  }
}
setTimeout(initOffscreens, 150);
window.addEventListener("resize", initOffscreens);

// ── Mic ────────────────────────────────────────────────────
document.getElementById("mic-btn").addEventListener("click", ()=> micOn ? stopMic() : startMic());

async function startMic() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) { alert("Web Audio API not supported."); return; }
    stream   = await navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
    audioCtx = new AC({ sampleRate:44100 });
    if (audioCtx.state==="suspended") await audioCtx.resume();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = gainVal;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0.78;
    fftData  = new Float32Array(analyser.frequencyBinCount);
    audioCtx.createMediaStreamSource(stream).connect(gainNode);
    gainNode.connect(analyser);
    document.getElementById("sr-label").textContent = audioCtx.sampleRate + " Hz";
    setMicUI(true);
    renderLoop();
  } catch(e) {
    alert(e.name==="NotAllowedError"
      ? "Microphone access denied.\nCheck Safari Settings → Microphone."
      : "Error: " + e.message);
  }
}

function stopMic() {
  if (rafId) { cancelAnimationFrame(rafId); rafId=null; }
  stream?.getTracks().forEach(t=>t.stop()); stream=null;
  audioCtx?.close().catch(()=>{}); audioCtx=null; analyser=null;
  setMicUI(false); resetState();
}
function setMicUI(on) {
  micOn = on;
  const btn = document.getElementById("mic-btn");
  btn.textContent = on ? "🎙 MIC ON" : "🔇 MIC OFF";
  btn.className   = on ? "on" : "";
}
document.addEventListener("visibilitychange", ()=>{
  if (!document.hidden && audioCtx?.state==="suspended") audioCtx.resume().catch(()=>{});
});

// ── Pitch & beat detection ─────────────────────────────────
function detectPitch(data, sr) {
  const binSize = sr / FFT_SIZE;
  const thresh  = -100 + sensVal * 65;
  let maxVal=-Infinity, maxBin=0;
  const lo=Math.floor(27.5/binSize), hi=Math.min(Math.floor(4200/binSize), data.length-1);
  for (let i=lo; i<=hi; i++) if (data[i]>maxVal) { maxVal=data[i]; maxBin=i; }
  if (maxVal<thresh) return null;
  const prev=maxBin>0?data[maxBin-1]:data[maxBin];
  const next=maxBin<data.length-1?data[maxBin+1]:data[maxBin];
  const denom=prev-2*maxVal+next;
  const delta=Math.abs(denom)>0.001?0.5*(prev-next)/denom:0;
  return (maxBin+delta)*binSize;
}

function detectBeat(data, sr, hFreq) {
  if (!hFreq) return null;
  const binSize = sr / FFT_SIZE;
  const winHz   = Math.max(12, hFreq * 0.012);
  const cBin    = Math.round(hFreq/binSize);
  const wBins   = Math.max(5, Math.round(winHz/binSize));
  const s=Math.max(1,cBin-wBins), e=Math.min(data.length-2,cBin+wBins);
  const peaks=[];
  for (let i=s; i<=e; i++) {
    if (data[i]>data[i-1] && data[i]>data[i+1] && data[i]>-78)
      peaks.push({f:i*binSize, v:data[i]});
  }
  peaks.sort((a,b)=>b.v-a.v);
  if (peaks.length<2) return null;
  return Math.abs(peaks[0].f-peaks[1].f);
}

function freqToNote(freq) {
  if (!freq||freq<27.5||freq>4978) return null;
  const midi=69+12*Math.log2(freq/440);
  const r=Math.round(midi);
  if (r<33||r>108) return null;
  return { name: NOTE_NAMES[r%12]+(Math.floor(r/12)-1), cents:(midi-r)*100 };
}

// ── Render loop ────────────────────────────────────────────
function renderLoop() {
  rafId = requestAnimationFrame(renderLoop);
  if (!analyser||!fftData) return;
  const sr = audioCtx?.sampleRate||44100;
  analyser.getFloatFrequencyData(fftData);

  // Level
  let peak=-Infinity;
  for (let i=0;i<fftData.length;i++) if(fftData[i]>peak) peak=fftData[i];
  updateLevel(peak);

  const freq = detectPitch(fftData, sr);
  if (freq) updateNoteDisplay(freq);

  const binSize = sr / FFT_SIZE;

  for (let h=0; h<NUM_H; h++) {
    const hFreq = freq ? freq*(h+1) : null;
    const fEl   = document.getElementById(`hf${h}`);
    if (fEl) fEl.textContent = hFreq ? hFreq.toFixed(1)+" Hz" : "—";

    // Beat detection
    const beat = detectBeat(fftData, sr, hFreq);
    beatVals[h] = beat;
    if (beat!==null) {
      beatNullCount[h] = 0;
      beatHistory[h].push(beat);
      if (beatHistory[h].length>BEAT_SMOOTH) beatHistory[h].shift();
      statusVals[h] = beat<0.08?2:beat<0.6?1:0;
    } else {
      beatNullCount[h]++;
      if (beatNullCount[h] > BEAT_NULL_THRESHOLD) {
        beatHistory[h]=[]; statusVals[h]=0;
      }
    }

    drawSpectroColumn(h, hFreq, binSize);
  }
  updateBeatDisplay();
}

// ── Fine spectrogram ───────────────────────────────────────
function drawSpectroColumn(h, hFreq, binSize) {
  const off=offscreens[h], ctx=offCtxs[h];
  const cv=panelCanvases[h], pCtx=panelCtxs[h];
  if (!off||!ctx||!cv||!pCtx) return;

  const W=off.width, H=off.height;
  const dpr=window.devicePixelRatio||1;
  const shift=SCROLL_SPD*dpr;

  // Scroll left
  ctx.drawImage(off, -shift, 0);

  const colX = W - shift - 1;
  const colW = shift + 2;

  if (hFreq) {
    // Show ±25% around harmonic — wider range like reference image
    const halfHz = hFreq * 0.25;
    const fLo    = Math.max(0, hFreq - halfHz);
    const fHi    = hFreq + halfHz;
    const bLo    = Math.max(0, Math.floor(fLo/binSize));
    const bHi    = Math.min(fftData.length-1, Math.ceil(fHi/binSize));
    const nBins  = Math.max(1, bHi-bLo);

    // Use ImageData for pixel-perfect rendering
    const imgData = ctx.createImageData(Math.ceil(colW), H);
    const data    = imgData.data;

    for (let py=0; py<H; py++) {
      // Map pixel row to frequency bin (bottom = low freq, top = high freq)
      const binIdx = bLo + Math.floor((1 - py/H) * nBins);
      const db     = fftData[Math.min(bHi, Math.max(bLo, binIdx))];
      const [r,g,b] = dbToRGB(db);
      const idx    = py * Math.ceil(colW) * 4;
      for (let px=0; px<Math.ceil(colW); px++) {
        const i = idx + px*4;
        data[i]   = r;
        data[i+1] = g;
        data[i+2] = b;
        data[i+3] = 255;
      }
    }
    ctx.putImageData(imgData, colX, 0);

    // Centre marker (harmonic frequency line)
    const cy = H/2;
    ctx.strokeStyle = "rgba(255,220,0,0.3)";
    ctx.lineWidth = dpr;
    ctx.beginPath(); ctx.moveTo(colX,cy); ctx.lineTo(colX+colW,cy); ctx.stroke();
  } else {
    ctx.fillStyle="#000";
    ctx.fillRect(colX, 0, colW, H);
  }

  // Blit to visible canvas
  pCtx.drawImage(off, 0, 0);
}

// ── Beat & border display ──────────────────────────────────
function updateBeatDisplay() {
  let anySelected = false;
  for (let h=0; h<NUM_H; h++) {
    const on   = selH[h];
    const card = beatCards[h];
    const wrap = panelWraps[h];
    const bo   = document.getElementById(`bo${h}`);
    const valEl= document.getElementById(`bcv${h}`);
    const hist = beatHistory[h];
    const st   = statusVals[h];

    // Panel border colour
    wrap.className = "hr-canvas-wrap" + (on && st===2 ? " match" : on ? " selected" : "");

    // Beat card
    card.style.display = on ? "block" : "none";
    if (on) {
      anySelected = true;
      const col = st===2?"#00ff55":st===1?"#ffdd00":"#ff8844";
      card.style.borderColor = st===2?"#00cc44":st===1?"#cc9900":"#333";
      valEl.style.color = col;
      if (hist.length===0) {
        valEl.textContent="—";
      } else {
        const avg=hist.reduce((a,v)=>a+v,0)/hist.length;
        valEl.textContent = avg<0.005?"0.00":avg.toFixed(2);
      }

      // Beat overlay in panel
      if (bo) {
        if (hist.length>0) {
          const avg=hist.reduce((a,v)=>a+v,0)/hist.length;
          bo.textContent = (avg<0.005?"0.00":avg.toFixed(2))+" b/s";
          bo.style.display="block";
          bo.style.color=col;
        } else { bo.style.display="none"; }
      }
    } else {
      if (bo) bo.style.display="none";
    }
  }
  document.getElementById("beat-bar-empty").style.display = anySelected?"none":"block";
}

// ── Harmonic toggle ────────────────────────────────────────
function toggleH(h) {
  selH[h] = !selH[h];
  hsBtns[h].className = "hs-btn" + (selH[h]?" selected":"");
}

// ── Note / level display ───────────────────────────────────
function updateNoteDisplay(freq) {
  const note=freqToNote(freq);
  const nb=document.getElementById("note-big");
  const ns=document.getElementById("note-sub");
  const cv=document.getElementById("cents-val");
  const mn=document.getElementById("meter-needle");
  if (note) {
    nb.textContent=note.name; nb.style.color="#fff";
    ns.textContent=`${freq.toFixed(2)} Hz  ${note.cents>=0?"+":""}${note.cents.toFixed(1)}¢`;
    ns.style.color="#aaa";
    cv.textContent=`${note.cents>=0?"+":""}${note.cents.toFixed(1)} cent`;
    mn.style.left=(50+Math.max(-50,Math.min(50,note.cents)))+"%";
  } else {
    nb.textContent="—"; nb.style.color="#444";
    ns.textContent="— Hz"; ns.style.color="#444";
    cv.textContent="— cent"; mn.style.left="50%";
  }
}

function updateLevel(db) {
  const pct=Math.max(0,Math.min(100,(db+96)/96*100));
  document.getElementById("level-bar").style.width=pct+"%";
  document.getElementById("level-db").textContent=isFinite(db)?db.toFixed(1)+" dB":"— dB";
}

function resetState() {
  beatVals=new Array(NUM_H).fill(null);
  statusVals=new Array(NUM_H).fill(0);
  beatHistory=Array.from({length:NUM_H},()=>[]);
  beatNullCount=new Array(NUM_H).fill(0);
  updateNoteDisplay(null); updateLevel(-Infinity); updateBeatDisplay();
  for (let h=0;h<NUM_H;h++) {
    const bo=document.getElementById(`bo${h}`);
    if(bo) bo.style.display="none";
    panelWraps[h].className="hr-canvas-wrap";
  }
}

// ── Sliders ────────────────────────────────────────────────
document.getElementById("sl-gain").addEventListener("input",function(){
  gainVal=parseFloat(this.value);
  document.getElementById("vl-gain").textContent=gainVal.toFixed(1);
  if(gainNode) gainNode.gain.value=gainVal;
});
document.getElementById("sl-sens").addEventListener("input",function(){
  sensVal=parseFloat(this.value);
  document.getElementById("vl-sens").textContent=sensVal.toFixed(2);
});
</script>
