<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Unison Analyzer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
height: 100%;
overflow: hidden; /* prevent page scroll */
}

body {
background: #111;
color: #fff;
font-family: -apple-system, ‘Helvetica Neue’, sans-serif;
height: 100dvh;
display: flex;
flex-direction: column;
font-size: 13px;
overflow: hidden;
}

/* ── Header ── */
#header {
background: #1a1a1a;
border-bottom: 1px solid #333;
padding: 8px 12px;
display: flex;
flex-direction: column;
gap: 6px;
flex-shrink: 0;
}
#title-row {
display: flex;
align-items: center;
justify-content: center;
position: relative;
}
#app-title {
font-size: 17px;
font-weight: 600;
letter-spacing: 1px;
color: #fff;
}
#mic-btn {
position: absolute;
right: 0;
background: #2a0808;
border: 1.5px solid #882;
border-radius: 8px;
color: #f55;
font-size: 13px;
font-family: -apple-system, sans-serif;
padding: 6px 12px;
cursor: pointer;
-webkit-appearance: none;
transition: all 0.15s;
min-width: 90px;
text-align: center;
}
#mic-btn.on { background: #0a1a2a; border-color: #2255aa; color: #88aaff; }

/* Info bar */
#info-bar {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
align-items: center;
}
.info-box {
background: #222;
border: 1px solid #333;
border-radius: 6px;
padding: 5px 8px;
}
.info-box .ib-label { font-size: 10px; color: #888; margin-bottom: 2px; }
#note-big { font-size: 28px; font-weight: bold; color: #fff; line-height: 1; }
#note-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

/* Level meter */
#level-bar-wrap {
height: 14px; background: #000; border-radius: 3px;
overflow: hidden; margin: 3px 0; border: 1px solid #333;
}
#level-bar { height: 100%; width: 0%; background: linear-gradient(to right, #0c0, #aa0, #c00); transition: width 0.05s; }
#level-db { font-size: 11px; color: #aaa; text-align: right; }

/* ── Section label ── */
.section-label {
background: #1a1a1a;
border-top: 1px solid #333;
border-bottom: 1px solid #333;
padding: 4px 12px;
font-size: 11px;
color: #888;
display: flex;
justify-content: space-between;
align-items: center;
flex-shrink: 0;
}

/* ── Harmonic select buttons ── */
#harmonic-select {
background: #161616;
border-bottom: 1px solid #2a2a2a;
padding: 6px 10px;
display: flex;
gap: 5px;
align-items: center;
flex-shrink: 0;
}
#harmonic-select .hs-label {
font-size: 11px;
color: #666;
flex-shrink: 0;
margin-right: 2px;
}
.hs-btn {
flex: 1;
background: #1a1a1a;
border: 1.5px solid #2a2a2a;
border-radius: 6px;
color: #555;
font-size: 12px;
font-family: -apple-system, sans-serif;
padding: 6px 2px;
cursor: pointer;
-webkit-appearance: none;
text-align: center;
transition: all 0.15s;
user-select: none;
}
.hs-btn.selected {
background: #1a2a00;
border-color: #ccff00;
color: #ccff00;
}

/* ── Single spectrogram ── */
#spectro-section {
flex: 1;
display: flex;
flex-direction: column;
overflow: hidden;
min-height: 0;
}
#spectro-outer {
flex: 1;
display: flex;
overflow: hidden;
min-height: 0;
position: relative;
}
#spectro-canvas-wrap {
flex: 1;
position: relative;
overflow: hidden;
}
#spectro-canvas {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
}
/* Freq axis labels */
#freq-axis {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
}
.freq-label {
position: absolute;
left: 4px;
font-size: 11px;
font-weight: 600;
color: #fff;
background: rgba(0,0,0,0.55);
padding: 0 3px;
border-radius: 2px;
transform: translateY(-50%);
white-space: nowrap;
z-index: 10;
}

/* dB scale */
#db-scale {
width: 32px;
flex-shrink: 0;
display: flex;
flex-direction: column;
padding: 2px 0;
background: #000;
border-left: 1px solid #222;
position: relative;
}
#db-gradient {
flex: 1;
margin: 0 6px;
background: linear-gradient(to bottom,
#ff0000 0%, #ff4400 8%, #ff8800 16%,
#ffcc00 25%, #aaff00 35%, #00ff88 45%,
#00ccff 55%, #0066ff 70%, #0000aa 85%, #000033 100%);
border-radius: 2px;
position: relative;
}
.db-tick {
position: absolute;
right: -18px;
font-size: 8px;
color: #aaa;
transform: translateY(-50%);
white-space: nowrap;
}

/* ── Beat display bar ── */
#beat-bar {
background: #1a1a1a;
border-top: 1px solid #333;
padding: 6px 10px;
display: flex;
gap: 5px;
flex-wrap: wrap;
min-height: 58px;
align-items: center;
flex-shrink: 0;
}
#beat-bar-empty {
font-size: 12px;
color: #444;
width: 100%;
text-align: center;
}
.beat-card {
flex: 1;
min-width: 56px;
background: #111;
border: 1px solid #2a2a2a;
border-radius: 6px;
padding: 4px 3px;
text-align: center;
transition: border-color 0.2s;
}
.beat-card .bc-h { font-size: 10px; color: #555; }
.beat-card .bc-val { font-size: 20px; font-weight: bold; line-height: 1.1; }
.beat-card .bc-unit { font-size: 9px; color: #555; }

/* controls removed */
/* ── Controls ── */
#controls {
background: #1a1a1a;
border-top: 1px solid #333;
padding: 6px 12px;
display: flex;
flex-direction: column;
gap: 6px;
flex-shrink: 0;
}
.ctrl-row { display: flex; align-items: center; gap: 8px; }
.ctrl-label { font-size: 11px; color: #666; min-width: 40px; letter-spacing: 0.5px; }
.ctrl-row input[type=range] { flex: 1; accent-color: #3355cc; height: 22px; }
.ctrl-val { font-size: 11px; color: #888; min-width: 44px; text-align: right; }
</style>

</head>
<body>

<!-- Header -->

<div id="header">
  <div id="title-row">
    <span id="app-title">UNISON ANALYZER</span>
    <button id="mic-btn">🔇 MIC OFF</button>
  </div>
  <div id="info-bar">
    <div class="info-box">
      <div class="ib-label">Detected Note</div>
      <div id="note-big">—</div>
      <div id="note-sub" style="color:#444">— Hz</div>
    </div>
    <div class="info-box">
      <div class="ib-label">Input Level</div>
      <div id="level-bar-wrap"><div id="level-bar"></div></div>
      <div id="level-db">— dB</div>
    </div>
  </div>
</div>

<!-- FFT section label -->

<div class="section-label">
  <span>FFT / Spectrogram (H1–H8)</span>
  <span id="sr-label">44100 Hz</span>
</div>

<!-- Harmonic select buttons -->

<div id="harmonic-select">
  <span class="hs-label">Select:</span>
</div>

<!-- Spectrogram -->

<div id="spectro-section">
  <div id="spectro-outer">
    <div id="spectro-canvas-wrap">
      <canvas id="spectro-canvas"></canvas>
      <div id="freq-axis"></div>
    </div>
    <div id="db-scale">
      <div style="font-size:8px;color:#888;text-align:center;padding-top:2px;flex-shrink:0;">0</div>
      <div id="db-gradient">
        <div class="db-tick" style="top:0%">0</div>
        <div class="db-tick" style="top:12%">-12</div>
        <div class="db-tick" style="top:25%">-24</div>
        <div class="db-tick" style="top:37%">-36</div>
        <div class="db-tick" style="top:50%">-48</div>
        <div class="db-tick" style="top:62%">-60</div>
        <div class="db-tick" style="top:75%">-72</div>
        <div class="db-tick" style="top:87%">-84</div>
      </div>
      <div style="font-size:8px;color:#888;text-align:center;padding-bottom:2px;flex-shrink:0;">-96</div>
    </div>
  </div>
</div>

<!-- Beat display -->

<div class="section-label"><span>Beat Frequency — Selected Harmonics</span></div>
<div id="beat-bar"><span id="beat-bar-empty">Select a harmonic above to show beat frequency</span></div>

<!-- Gain control -->

<div id="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">GAIN</span>
    <input type="range" id="sl-gain" min="10" max="90" step="1" value="50">
    <span class="ctrl-val" id="vl-gain">50 dB</span>
  </div>
</div>

<script>
const NOTE_NAMES  = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FFT_SIZE    = 16384;
const NUM_H       = 8;
const BEAT_SMOOTH = 20;
const BEAT_NULL_THRESH = 30;
const SCROLL_SPD  = 1;

// Colour map matching reference image (blue→cyan→green→yellow→red)
// Tuned to iPhone mic levels (-96 to -40dB typical range)
function dbToRGB(db) {
  // Map -96dB→0, -40dB→1 (compress range for visibility)
  const t = Math.max(0, Math.min(1, (db + 96) / 56));
  if (t < 0.20) {
    // black → blue
    const s = t / 0.20;
    return [0, 0, Math.round(s * 255)];
  } else if (t < 0.40) {
    // blue → cyan
    const s = (t - 0.20) / 0.20;
    return [0, Math.round(s * 255), 255];
  } else if (t < 0.60) {
    // cyan → green → yellow
    const s = (t - 0.40) / 0.20;
    return [Math.round(s * 255), 255, Math.round(255 - s * 255)];
  } else if (t < 0.80) {
    // yellow → orange → red
    const s = (t - 0.60) / 0.20;
    return [255, Math.round(255 - s * 200), 0];
  } else {
    // red (hot)
    return [255, 0, 0];
  }
}

// ── State ──────────────────────────────────────────────────
let micOn        = false;
let gainVal      = 5.0;  // fixed high gain
let sensVal      = 0.55;
let selH         = new Array(NUM_H).fill(false);
let beatHistory  = Array.from({length:NUM_H}, ()=>[]);
let beatNullCount= new Array(NUM_H).fill(0);
let statusVals   = new Array(NUM_H).fill(0);
let currentFreq  = null;

const FREQ_LO = 10;
const FREQ_HI = 10000;
let spectroGain = 50; // adjustable via slider

function dbToRGB(db) {
  const boosted = db + spectroGain;
  // Map -96→0 to 0→1
  const t = Math.max(0, Math.min(1, (boosted + 96) / 96));

  // Reference app colours:
  // 0.00-0.30: dark blue → blue → cyan (noise floor)
  // 0.30-0.50: cyan → green
  // 0.50-0.70: green → yellow
  // 0.70-0.85: yellow → orange
  // 0.85-1.00: orange → red → dark red
  if (t < 0.15) {
    const s = t / 0.15;
    return [0, Math.round(s * 100), Math.round(100 + s * 100)];
  } else if (t < 0.30) {
    const s = (t - 0.15) / 0.15;
    return [0, Math.round(100 + s * 155), 200];
  } else if (t < 0.45) {
    const s = (t - 0.30) / 0.15;
    return [0, 255, Math.round(200 - s * 200)];
  } else if (t < 0.60) {
    const s = (t - 0.45) / 0.15;
    return [Math.round(s * 255), 255, 0];
  } else if (t < 0.75) {
    const s = (t - 0.60) / 0.15;
    return [255, Math.round(255 - s * 130), 0];
  } else if (t < 0.90) {
    const s = (t - 0.75) / 0.15;
    return [255, Math.round(125 - s * 125), 0];
  } else {
    const s = (t - 0.90) / 0.10;
    return [Math.round(255 - s * 100), 0, 0];
  }
}

// Dynamic view range (changed by pinch zoom / 2-finger scroll)
let viewLo = 10;
let viewHi = 10000;

function freqToY(freq, H) {
  return H * (1 - (Math.max(viewLo, Math.min(viewHi, freq)) - viewLo) / (viewHi - viewLo));
}
function yToFreq(y, H) {
  return viewLo + (1 - y / H) * (viewHi - viewLo);
}

let audioCtx=null, analyser=null, gainNode=null, stream=null, fftData=null, rafId=null;

// Single offscreen canvas for scrolling spectrogram
let offCanvas = null, offCtx = null;
const spectroCanvas = document.getElementById("spectro-canvas");
const spectroCtx    = spectroCanvas.getContext("2d");
const freqAxisEl    = document.getElementById("freq-axis");
const hsBtns        = [];
const beatCards     = [];

// ── Build harmonic select buttons ─────────────────────────
const hSelWrap = document.getElementById("harmonic-select");
for (let h = 0; h < NUM_H; h++) {
  const btn = document.createElement("button");
  btn.className = "hs-btn";
  btn.textContent = "H" + (h+1);
  btn.addEventListener("click", ()=>toggleH(h));
  hSelWrap.appendChild(btn);
  hsBtns[h] = btn;
}

// ── Build beat cards ───────────────────────────────────────
const beatBarEl = document.getElementById("beat-bar");
for (let h = 0; h < NUM_H; h++) {
  const card = document.createElement("div");
  card.className = "beat-card";
  card.id = `bcard${h}`;
  card.style.display = "none";
  card.innerHTML = `<div class="bc-h">H${h+1}</div><div class="bc-val" id="bcv${h}" style="color:#888">—</div><div class="bc-unit">beat/s</div>`;
  beatBarEl.appendChild(card);
  beatCards[h] = card;
}

// ── Init canvas ────────────────────────────────────────────
function initCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w   = spectroCanvas.parentElement.clientWidth  || 320;
  const h   = spectroCanvas.parentElement.clientHeight || 300;
  spectroCanvas.width  = w * dpr;
  spectroCanvas.height = h * dpr;
  spectroCanvas.style.width  = w + "px";
  spectroCanvas.style.height = h + "px";

  offCanvas        = document.createElement("canvas");
  offCanvas.width  = w * dpr;
  offCanvas.height = h * dpr;
  offCtx           = offCanvas.getContext("2d");
  offCtx.fillStyle = "#000";
  offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);

  updateFreqAxisLabels();
}
setTimeout(initCanvas, 150);
window.addEventListener("resize", initCanvas);

// ── Pinch zoom on spectrogram ──────────────────────────────
let pinchStartDist  = null;
let pinchStartLo    = null;
let pinchStartHi    = null;
let pinchCenterFreq = null;
let pinchStartMidY  = null;
let isPinching      = false;

function getTouchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function getTouchMidY(e) {
  return (e.touches[0].clientY + e.touches[1].clientY) / 2;
}

const spectroWrapEl = document.getElementById("spectro-canvas-wrap");

spectroWrapEl.addEventListener("touchstart", e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    isPinching      = true;
    pinchStartDist  = getTouchDist(e);
    pinchStartLo    = viewLo;
    pinchStartHi    = viewHi;
    pinchStartMidY  = getTouchMidY(e);
    const rect = spectroCanvas.getBoundingClientRect();
    const midY = pinchStartMidY - rect.top;
    pinchCenterFreq = yToFreq(midY, rect.height);
  }
}, { passive: false });

spectroWrapEl.addEventListener("touchmove", e => {
  if (e.touches.length === 2 && pinchStartDist !== null) {
    e.preventDefault();
    const rect   = spectroCanvas.getBoundingClientRect();
    const dist   = getTouchDist(e);
    const curMidY= getTouchMidY(e);
    const range  = pinchStartHi - pinchStartLo;

    // ── Pinch zoom ──
    const scale    = pinchStartDist / dist;
    const newRange = Math.max(50, Math.min(FREQ_HI - FREQ_LO, range * scale));
    let lo = pinchCenterFreq - newRange * ((pinchCenterFreq - pinchStartLo) / range);
    let hi = lo + newRange;

    // ── 2-finger scroll (vertical drag) ──
    const dragPx   = pinchStartMidY - curMidY; // px moved upward
    const freqShift= (dragPx / rect.height) * newRange;
    lo += freqShift;
    hi += freqShift;

    // Clamp
    if (lo < FREQ_LO) { lo = FREQ_LO; hi = lo + newRange; }
    if (hi > FREQ_HI) { hi = FREQ_HI; lo = hi - newRange; }
    if (lo < FREQ_LO)   lo = FREQ_LO;

    viewLo = lo;
    viewHi = hi;

    // Clear offscreen on range change
    if (offCtx && offCanvas) {
      offCtx.fillStyle = "#000";
      offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
    }
  }
}, { passive: false });

spectroWrapEl.addEventListener("touchend", e => {
  if (e.touches.length < 2) {
    pinchStartDist = null;
    isPinching = false;
  }
});


// ── Mic ────────────────────────────────────────────────────
document.getElementById("mic-btn").addEventListener("click", ()=> micOn ? stopMic() : startMic());

async function startMic() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) { alert("Web Audio API not supported."); return; }
    stream   = await navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
    audioCtx = new AC({ sampleRate:44100 });
    if (audioCtx.state==="suspended") await audioCtx.resume();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = gainVal;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0.85;
    fftData  = new Float32Array(analyser.frequencyBinCount);
    audioCtx.createMediaStreamSource(stream).connect(gainNode);
    gainNode.connect(analyser);
    document.getElementById("sr-label").textContent = audioCtx.sampleRate + " Hz";
    setMicUI(true);
    renderLoop();
  } catch(e) {
    alert(e.name==="NotAllowedError"
      ? "Microphone access denied.\nCheck Safari Settings → Microphone."
      : "Error: " + e.message);
  }
}
function stopMic() {
  if (rafId) { cancelAnimationFrame(rafId); rafId=null; }
  stream?.getTracks().forEach(t=>t.stop()); stream=null;
  audioCtx?.close().catch(()=>{}); audioCtx=null; analyser=null;
  setMicUI(false); resetState();
}
function setMicUI(on) {
  micOn = on;
  const btn = document.getElementById("mic-btn");
  btn.textContent = on ? "🎙 MIC ON" : "🔇 MIC OFF";
  btn.className   = on ? "on" : "";
}
document.addEventListener("visibilitychange", ()=>{
  if (!document.hidden && audioCtx?.state==="suspended") audioCtx.resume().catch(()=>{});
});

// ── Pitch detection using HPS (Harmonic Product Spectrum) ──
function detectPitch(data, sr) {
  const binSize = sr / FFT_SIZE;
  const lo = Math.floor(27.5 / binSize);
  const hi = Math.min(Math.floor(2000 / binSize), data.length - 1);

  // Convert dB to linear amplitude
  const linear = new Float32Array(data.length);
  for (let i = 0; i < data.length; i++) {
    linear[i] = Math.pow(10, data[i] / 20);
  }

  // HPS: multiply spectrum x downsampled x2, x3, x4, x5
  let maxVal = 0, maxBin = 0;
  for (let i = lo; i <= hi; i++) {
    const v = linear[i]
      * linear[Math.min(i*2, data.length-1)]
      * linear[Math.min(i*3, data.length-1)]
      * linear[Math.min(i*4, data.length-1)]
      * linear[Math.min(i*5, data.length-1)];
    if (v > maxVal) { maxVal = v; maxBin = i; }
  }

  // Require minimum signal strength
  if (data[maxBin] < -72) return null;

  // Parabolic interpolation for sub-bin accuracy
  const prev  = maxBin > 0 ? linear[maxBin-1] : linear[maxBin];
  const cur   = linear[maxBin];
  const next  = maxBin < data.length-1 ? linear[maxBin+1] : linear[maxBin];
  const denom = prev - 2*cur + next;
  const delta = Math.abs(denom) > 1e-10 ? 0.5*(prev-next)/denom : 0;
  return (maxBin + Math.max(-0.5, Math.min(0.5, delta))) * binSize;
}

function detectBeat(data, sr, hFreq) {
  if (!hFreq) return null;
  const binSize = sr / FFT_SIZE;
  const winHz   = Math.max(12, hFreq * 0.012);
  const cBin    = Math.round(hFreq/binSize);
  const wBins   = Math.max(5, Math.round(winHz/binSize));
  const s=Math.max(1,cBin-wBins), e=Math.min(data.length-2,cBin+wBins);
  const peaks=[];
  for (let i=s; i<=e; i++) {
    if (data[i]>data[i-1] && data[i]>data[i+1] && data[i]>-88)
      peaks.push({f:i*binSize, v:data[i]});
  }
  peaks.sort((a,b)=>b.v-a.v);
  if (peaks.length<2) return null;
  return Math.abs(peaks[0].f-peaks[1].f);
}

function freqToNote(freq) {
  if (!freq||freq<27.5||freq>4978) return null;
  const midi=69+12*Math.log2(freq/440);
  const r=Math.round(midi);
  if (r<33||r>108) return null;
  return { name: NOTE_NAMES[r%12]+(Math.floor(r/12)-1), cents:(midi-r)*100 };
}

// ── Render loop ────────────────────────────────────────────
function renderLoop() {
  rafId = requestAnimationFrame(renderLoop);
  if (!analyser||!fftData) return;
  const sr = audioCtx?.sampleRate||44100;
  analyser.getFloatFrequencyData(fftData);

  let peak=-Infinity;
  for (let i=0;i<fftData.length;i++) if(fftData[i]>peak) peak=fftData[i];
  updateLevel(peak);

  const freq = detectPitch(fftData, sr);
  if (freq) {
    currentFreq = freq;
    updateNoteDisplay(freq);
  }

  const binSize = sr / FFT_SIZE;

  // Beat detection per harmonic
  for (let h=0; h<NUM_H; h++) {
    const hFreq = currentFreq ? currentFreq*(h+1) : null;
    const beat  = detectBeat(fftData, sr, hFreq);
    if (beat!==null) {
      beatNullCount[h]=0;
      beatHistory[h].push(beat);
      if (beatHistory[h].length>BEAT_SMOOTH) beatHistory[h].shift();
      statusVals[h] = beat<0.08?2:beat<0.6?1:0;
    } else {
      beatNullCount[h]++;
      if (beatNullCount[h]>BEAT_NULL_THRESH) { beatHistory[h]=[]; statusVals[h]=0; }
    }
  }

  drawSpectroColumn(binSize);
  updateBeatDisplay();
  updateFreqAxisLabels();
}

// ── Single spectrogram column (log-scale, fixed range) ─────
function drawSpectroColumn(binSize) {
  if (!offCanvas||!offCtx) return;
  const W   = offCanvas.width;
  const H   = offCanvas.height;
  const dpr = window.devicePixelRatio||1;
  const shift = SCROLL_SPD * dpr;

  // Scroll left
  offCtx.drawImage(offCanvas, -shift, 0);

  // New column — log-scale mapping
  const colW = Math.ceil(shift) + 1;
  const colX = W - colW;
  const img  = offCtx.createImageData(colW, H);
  const d    = img.data;

  for (let py = 0; py < H; py++) {
    const freq = yToFreq(py, H);
    const bin  = Math.round(freq / binSize);
    const db   = (bin >= 0 && bin < fftData.length) ? fftData[bin] : -120;
    // Sample neighbours for peak spreading (makes lines thicker/bolder)
    const dbP1 = (bin+1 >= 0 && bin+1 < fftData.length) ? fftData[bin+1] : -120;
    const dbM1 = (bin-1 >= 0 && bin-1 < fftData.length) ? fftData[bin-1] : -120;
    const dbMax = Math.max(db, dbP1 * 0.85, dbM1 * 0.85);
    const [r,g,b] = dbToRGB(dbMax);
    for (let px = 0; px < colW; px++) {
      const i = (py * colW + px) * 4;
      d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=255;
    }
  }
  offCtx.putImageData(img, colX, 0);

  // Harmonic lines
  if (currentFreq) {
    for (let h=0; h<NUM_H; h++) {
      const hf = currentFreq * (h+1);
      if (hf > FREQ_HI) continue;
      const py = freqToY(hf, H);
      const selected = selH[h];
      offCtx.strokeStyle = selected ? "rgba(200,255,0,0.6)" : "rgba(255,220,0,0.2)";
      offCtx.lineWidth   = selected ? 1.5*dpr : dpr;
      offCtx.beginPath();
      offCtx.moveTo(colX, py);
      offCtx.lineTo(colX+colW, py);
      offCtx.stroke();
    }
  }

  spectroCtx.drawImage(offCanvas, 0, 0);
}

// ── Freq axis labels ───────────────────────────────────────
let lastAxisUpdate = 0;
function updateFreqAxisLabels() {
  const now = Date.now();
  if (now - lastAxisUpdate < 500) return;
  lastAxisUpdate = now;

  freqAxisEl.innerHTML = "";
  const H = spectroCanvas.clientHeight || 300;

  // Grid labels
  const gridFreqs = [100, 200, 500, 1000, 2000, 3000, 4000, 5000, 6000, 7000, 8000, 9000, 10000];
  gridFreqs.forEach(f => {
    if (f < viewLo || f > viewHi) return;
    const y   = freqToY(f, H);
    const lbl = document.createElement("div");
    lbl.className = "freq-label";
    lbl.style.top   = y + "px";
    lbl.style.color = "rgba(255,255,255,0.7)";
    lbl.textContent = f >= 1000 ? (f/1000)+"kHz" : f+"Hz";
    freqAxisEl.appendChild(lbl);
  });

  // Harmonic lines
  if (currentFreq) {
    for (let h=0; h<NUM_H; h++) {
      const hf = currentFreq * (h+1);
      if (hf > FREQ_HI) continue;
      const y   = freqToY(hf, H);
      const lbl = document.createElement("div");
      lbl.className = "freq-label";
      lbl.style.top   = y + "px";
      lbl.style.color = selH[h] ? "rgba(200,255,0,0.9)" : "rgba(255,220,100,0.5)";
      lbl.textContent = `H${h+1} ${hf.toFixed(0)}Hz`;
      freqAxisEl.appendChild(lbl);
    }
  }
}

// ── Beat display ───────────────────────────────────────────
function updateBeatDisplay() {
  let anySelected = false;
  for (let h=0; h<NUM_H; h++) {
    const on   = selH[h];
    const card = beatCards[h];
    const valEl= document.getElementById(`bcv${h}`);
    const hist = beatHistory[h];
    const st   = statusVals[h];

    card.style.display = on ? "block" : "none";
    if (on) {
      anySelected = true;
      const col = st===2?"#00ff55":st===1?"#ffdd00":"#ff8844";
      card.style.borderColor = st===2?"#00cc44":st===1?"#cc9900":"#333";
      valEl.style.color = col;
      if (hist.length===0) {
        valEl.textContent="—";
      } else {
        const avg = hist.reduce((a,v)=>a+v,0)/hist.length;
        valEl.textContent = avg<0.005?"0.00":avg.toFixed(2);
      }
    }
  }
  document.getElementById("beat-bar-empty").style.display = anySelected?"none":"block";
}

// ── Harmonic toggle ────────────────────────────────────────
function toggleH(h) {
  selH[h] = !selH[h];
  hsBtns[h].className = "hs-btn" + (selH[h]?" selected":"");
}

// ── Note / level display ───────────────────────────────────
function updateNoteDisplay(freq) {
  const note=freqToNote(freq);
  const nb=document.getElementById("note-big");
  const ns=document.getElementById("note-sub");
  if (note) {
    nb.textContent=note.name; nb.style.color="#fff";
    ns.textContent=`${freq.toFixed(2)} Hz  ${note.cents>=0?"+":""}${note.cents.toFixed(1)}¢`;
    ns.style.color="#aaa";
  } else {
    nb.textContent="—"; nb.style.color="#444";
    ns.textContent="— Hz"; ns.style.color="#444";
  }
}

function updateLevel(db) {
  const pct=Math.max(0,Math.min(100,(db+96)/96*100));
  document.getElementById("level-bar").style.width=pct+"%";
  document.getElementById("level-db").textContent=isFinite(db)?db.toFixed(1)+" dB":"— dB";
}

function resetState() {
  currentFreq=null;
  statusVals=new Array(NUM_H).fill(0);
  beatHistory=Array.from({length:NUM_H},()=>[]);
  beatNullCount=new Array(NUM_H).fill(0);
  updateNoteDisplay(null); updateLevel(-Infinity); updateBeatDisplay();
}

// sliders removed
document.getElementById("sl-gain").addEventListener("input", function() {
  spectroGain = parseInt(this.value);
  document.getElementById("vl-gain").textContent = spectroGain + " dB";
});
</script>
