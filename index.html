<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Unison Analyzer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
height: 100%;
overflow: hidden; /* prevent page scroll */
}

body {
background: #111;
color: #fff;
font-family: -apple-system, ‘Helvetica Neue’, sans-serif;
height: 100dvh;
display: flex;
flex-direction: column;
font-size: 13px;
overflow: hidden;
}

/* ── Header ── */
#header {
background: #1a1a1a;
border-bottom: 1px solid #333;
padding: 8px 12px;
display: flex;
flex-direction: column;
gap: 6px;
flex-shrink: 0;
}
#title-row {
display: flex;
align-items: center;
justify-content: center;
position: relative;
}
#app-title {
font-size: 17px;
font-weight: 600;
letter-spacing: 1px;
color: #fff;
}
#mic-btn {
position: absolute;
right: 0;
background: #2a0808;
border: 1.5px solid #882;
border-radius: 8px;
color: #f55;
font-size: 13px;
font-family: -apple-system, sans-serif;
padding: 6px 12px;
cursor: pointer;
-webkit-appearance: none;
transition: all 0.15s;
min-width: 90px;
text-align: center;
}
#mic-btn.on { background: #0a1a2a; border-color: #2255aa; color: #88aaff; }

/* Info bar */
#info-bar {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
align-items: center;
}
.info-box {
background: #222;
border: 1px solid #333;
border-radius: 6px;
padding: 5px 8px;
}
.info-box .ib-label { font-size: 10px; color: #888; margin-bottom: 2px; }
#note-big { font-size: 28px; font-weight: bold; color: #fff; line-height: 1; }
#note-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

/* Level meter */
#level-bar-wrap {
height: 14px; background: #000; border-radius: 3px;
overflow: hidden; margin: 3px 0; border: 1px solid #333;
}
#level-bar { height: 100%; width: 0%; background: linear-gradient(to right, #0c0, #aa0, #c00); transition: width 0.05s; }
#level-db { font-size: 11px; color: #aaa; text-align: right; }

/* ── Section label ── */
.section-label {
background: #1a1a1a;
border-top: 1px solid #333;
border-bottom: 1px solid #333;
padding: 4px 12px;
font-size: 11px;
color: #888;
display: flex;
justify-content: space-between;
align-items: center;
flex-shrink: 0;
}

/* ── Harmonic select buttons ── */
#harmonic-select {
background: #161616;
border-bottom: 1px solid #2a2a2a;
padding: 6px 10px;
display: flex;
gap: 5px;
align-items: center;
flex-shrink: 0;
}
#harmonic-select .hs-label {
font-size: 11px;
color: #666;
flex-shrink: 0;
margin-right: 2px;
}
.hs-btn {
flex: 1;
background: #1a1a1a;
border: 1.5px solid #2a2a2a;
border-radius: 6px;
color: #555;
font-size: 12px;
font-family: -apple-system, sans-serif;
padding: 6px 2px;
cursor: pointer;
-webkit-appearance: none;
text-align: center;
transition: all 0.15s;
user-select: none;
}
.hs-btn.selected {
background: #1a2a00;
border-color: #ccff00;
color: #ccff00;
}

/* ── Single spectrogram ── */
#spectro-section {
flex: 1;
display: flex;
flex-direction: column;
overflow: hidden;
min-height: 0;
}
#spectro-outer {
flex: 1;
display: flex;
overflow: hidden;
min-height: 0;
position: relative;
}
#spectro-canvas-wrap {
flex: 1;
position: relative;
overflow: hidden;
}
#spectro-canvas {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
}
/* Freq axis labels */
#freq-axis {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
}
.freq-label {
position: absolute;
left: 4px;
font-size: 9px;
color: rgba(255,255,255,0.5);
transform: translateY(-50%);
white-space: nowrap;
}

/* dB scale */
#db-scale {
width: 32px;
flex-shrink: 0;
display: flex;
flex-direction: column;
padding: 2px 0;
background: #000;
border-left: 1px solid #222;
position: relative;
}
#db-gradient {
flex: 1;
margin: 0 6px;
background: linear-gradient(to bottom,
#ff0000 0%, #ff4400 8%, #ff8800 16%,
#ffcc00 25%, #aaff00 35%, #00ff88 45%,
#00ccff 55%, #0066ff 70%, #0000aa 85%, #000033 100%);
border-radius: 2px;
position: relative;
}
.db-tick {
position: absolute;
right: -18px;
font-size: 8px;
color: #aaa;
transform: translateY(-50%);
white-space: nowrap;
}

/* ── Beat display bar ── */
#beat-bar {
background: #1a1a1a;
border-top: 1px solid #333;
padding: 6px 10px;
display: flex;
gap: 5px;
flex-wrap: wrap;
min-height: 58px;
align-items: center;
flex-shrink: 0;
}
#beat-bar-empty {
font-size: 12px;
color: #444;
width: 100%;
text-align: center;
}
.beat-card {
flex: 1;
min-width: 56px;
background: #111;
border: 1px solid #2a2a2a;
border-radius: 6px;
padding: 4px 3px;
text-align: center;
transition: border-color 0.2s;
}
.beat-card .bc-h { font-size: 10px; color: #555; }
.beat-card .bc-val { font-size: 20px; font-weight: bold; line-height: 1.1; }
.beat-card .bc-unit { font-size: 9px; color: #555; }

/* ── Controls ── */
#controls {
background: #1a1a1a;
border-top: 1px solid #333;
padding: 8px 12px;
display: flex;
flex-direction: column;
gap: 8px;
flex-shrink: 0;
}
.ctrl-row { display: flex; align-items: center; gap: 8px; }
.ctrl-label { font-size: 11px; color: #666; min-width: 84px; letter-spacing: 0.5px; }
.ctrl-row input[type=range] { flex: 1; accent-color: #3355cc; height: 22px; }
.ctrl-val { font-size: 12px; color: #888; min-width: 36px; text-align: right; }
</style>

</head>
<body>

<!-- Header -->

<div id="header">
  <div id="title-row">
    <span id="app-title">UNISON ANALYZER</span>
    <button id="mic-btn">🔇 MIC OFF</button>
  </div>
  <div id="info-bar">
    <div class="info-box">
      <div class="ib-label">Detected Note</div>
      <div id="note-big">—</div>
      <div id="note-sub" style="color:#444">— Hz</div>
    </div>
    <div class="info-box">
      <div class="ib-label">Input Level</div>
      <div id="level-bar-wrap"><div id="level-bar"></div></div>
      <div id="level-db">— dB</div>
    </div>
  </div>
</div>

<!-- FFT section label -->

<div class="section-label">
  <span>FFT / Spectrogram (H1–H8)</span>
  <span id="sr-label">44100 Hz</span>
</div>

<!-- Harmonic select buttons -->

<div id="harmonic-select">
  <span class="hs-label">Select:</span>
</div>

<!-- Spectrogram -->

<div id="spectro-section">
  <div id="spectro-outer">
    <div id="spectro-canvas-wrap">
      <canvas id="spectro-canvas"></canvas>
      <div id="freq-axis"></div>
    </div>
    <div id="db-scale">
      <div style="font-size:8px;color:#888;text-align:center;padding-top:2px;flex-shrink:0;">0</div>
      <div id="db-gradient">
        <div class="db-tick" style="top:0%">0</div>
        <div class="db-tick" style="top:12%">-12</div>
        <div class="db-tick" style="top:25%">-24</div>
        <div class="db-tick" style="top:37%">-36</div>
        <div class="db-tick" style="top:50%">-48</div>
        <div class="db-tick" style="top:62%">-60</div>
        <div class="db-tick" style="top:75%">-72</div>
        <div class="db-tick" style="top:87%">-84</div>
      </div>
      <div style="font-size:8px;color:#888;text-align:center;padding-bottom:2px;flex-shrink:0;">-96</div>
    </div>
  </div>
</div>

<!-- Beat display -->

<div class="section-label"><span>Beat Frequency — Selected Harmonics</span></div>
<div id="beat-bar"><span id="beat-bar-empty">Select a harmonic above to show beat frequency</span></div>

<!-- Controls removed -->

<script>
const NOTE_NAMES  = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FFT_SIZE    = 16384;
const NUM_H       = 8;
const BEAT_SMOOTH = 20;
const BEAT_NULL_THRESH = 30;
const SCROLL_SPD  = 1;

// Colour map: blue below -50dB, green at -50dB, red at 0dB
function dbToRGB(db) {
  if (db < -98) return [0, 0, 0];
  if (db < -50) {
    // -98 to -50: black → blue → cyan
    const t = (db + 98) / 48;
    if (t < 0.5) {
      const s = t / 0.5;
      return [0, 0, Math.round(s * 200)];
    } else {
      const s = (t - 0.5) / 0.5;
      return [0, Math.round(s * 200), 200];
    }
  } else {
    // -50 to 0: green → yellow → red
    const t = (db + 50) / 50;
    if (t < 0.5) {
      const s = t / 0.5;
      return [Math.round(s * 255), 200, 0];
    } else {
      const s = (t - 0.5) / 0.5;
      return [255, Math.round(200 - s * 200), 0];
    }
  }
}

// ── State ──────────────────────────────────────────────────
let micOn        = false;
let gainVal      = 2.0;
let sensVal      = 0.55;
let selH         = new Array(NUM_H).fill(false);
let beatHistory  = Array.from({length:NUM_H}, ()=>[]);
let beatNullCount= new Array(NUM_H).fill(0);
let statusVals   = new Array(NUM_H).fill(0);
let currentFreq  = null;
// Auto-zoom: displayed freq range
let dispFreqLo   = 20;
let dispFreqHi   = 4000;
let targetFreqLo = 20;
let targetFreqHi = 4000;

let audioCtx=null, analyser=null, gainNode=null, stream=null, fftData=null, rafId=null;

// Single offscreen canvas for scrolling spectrogram
let offCanvas = null, offCtx = null;
const spectroCanvas = document.getElementById("spectro-canvas");
const spectroCtx    = spectroCanvas.getContext("2d");
const freqAxisEl    = document.getElementById("freq-axis");
const hsBtns        = [];
const beatCards     = [];

// ── Build harmonic select buttons ─────────────────────────
const hSelWrap = document.getElementById("harmonic-select");
for (let h = 0; h < NUM_H; h++) {
  const btn = document.createElement("button");
  btn.className = "hs-btn";
  btn.textContent = "H" + (h+1);
  btn.addEventListener("click", ()=>toggleH(h));
  hSelWrap.appendChild(btn);
  hsBtns[h] = btn;
}

// ── Build beat cards ───────────────────────────────────────
const beatBarEl = document.getElementById("beat-bar");
for (let h = 0; h < NUM_H; h++) {
  const card = document.createElement("div");
  card.className = "beat-card";
  card.id = `bcard${h}`;
  card.style.display = "none";
  card.innerHTML = `<div class="bc-h">H${h+1}</div><div class="bc-val" id="bcv${h}" style="color:#888">—</div><div class="bc-unit">beat/s</div>`;
  beatBarEl.appendChild(card);
  beatCards[h] = card;
}

// ── Init canvas ────────────────────────────────────────────
function initCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w   = spectroCanvas.parentElement.clientWidth  || 320;
  const h   = spectroCanvas.parentElement.clientHeight || 300;
  spectroCanvas.width  = w * dpr;
  spectroCanvas.height = h * dpr;
  spectroCanvas.style.width  = w + "px";
  spectroCanvas.style.height = h + "px";

  offCanvas        = document.createElement("canvas");
  offCanvas.width  = w * dpr;
  offCanvas.height = h * dpr;
  offCtx           = offCanvas.getContext("2d");
  offCtx.fillStyle = "#000";
  offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);

  updateFreqAxisLabels();
}
setTimeout(initCanvas, 150);
window.addEventListener("resize", initCanvas);

// ── Mic ────────────────────────────────────────────────────
document.getElementById("mic-btn").addEventListener("click", ()=> micOn ? stopMic() : startMic());

async function startMic() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) { alert("Web Audio API not supported."); return; }
    stream   = await navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
    audioCtx = new AC({ sampleRate:44100 });
    if (audioCtx.state==="suspended") await audioCtx.resume();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = gainVal;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0.80;
    fftData  = new Float32Array(analyser.frequencyBinCount);
    audioCtx.createMediaStreamSource(stream).connect(gainNode);
    gainNode.connect(analyser);
    document.getElementById("sr-label").textContent = audioCtx.sampleRate + " Hz";
    setMicUI(true);
    renderLoop();
  } catch(e) {
    alert(e.name==="NotAllowedError"
      ? "Microphone access denied.\nCheck Safari Settings → Microphone."
      : "Error: " + e.message);
  }
}
function stopMic() {
  if (rafId) { cancelAnimationFrame(rafId); rafId=null; }
  stream?.getTracks().forEach(t=>t.stop()); stream=null;
  audioCtx?.close().catch(()=>{}); audioCtx=null; analyser=null;
  setMicUI(false); resetState();
}
function setMicUI(on) {
  micOn = on;
  const btn = document.getElementById("mic-btn");
  btn.textContent = on ? "🎙 MIC ON" : "🔇 MIC OFF";
  btn.className   = on ? "on" : "";
}
document.addEventListener("visibilitychange", ()=>{
  if (!document.hidden && audioCtx?.state==="suspended") audioCtx.resume().catch(()=>{});
});

// ── Pitch & beat detection ─────────────────────────────────
function detectPitch(data, sr) {
  const binSize = sr / FFT_SIZE;
  const thresh  = -100 + sensVal * 65;
  let maxVal=-Infinity, maxBin=0;
  const lo=Math.floor(27.5/binSize), hi=Math.min(Math.floor(4200/binSize), data.length-1);
  for (let i=lo; i<=hi; i++) if (data[i]>maxVal) { maxVal=data[i]; maxBin=i; }
  if (maxVal<thresh) return null;
  const prev=maxBin>0?data[maxBin-1]:data[maxBin];
  const next=maxBin<data.length-1?data[maxBin+1]:data[maxBin];
  const denom=prev-2*maxVal+next;
  const delta=Math.abs(denom)>0.001?0.5*(prev-next)/denom:0;
  return (maxBin+delta)*binSize;
}

function detectBeat(data, sr, hFreq) {
  if (!hFreq) return null;
  const binSize = sr / FFT_SIZE;
  const winHz   = Math.max(12, hFreq * 0.012);
  const cBin    = Math.round(hFreq/binSize);
  const wBins   = Math.max(5, Math.round(winHz/binSize));
  const s=Math.max(1,cBin-wBins), e=Math.min(data.length-2,cBin+wBins);
  const peaks=[];
  for (let i=s; i<=e; i++) {
    if (data[i]>data[i-1] && data[i]>data[i+1] && data[i]>-88)
      peaks.push({f:i*binSize, v:data[i]});
  }
  peaks.sort((a,b)=>b.v-a.v);
  if (peaks.length<2) return null;
  return Math.abs(peaks[0].f-peaks[1].f);
}

function freqToNote(freq) {
  if (!freq||freq<27.5||freq>4978) return null;
  const midi=69+12*Math.log2(freq/440);
  const r=Math.round(midi);
  if (r<33||r>108) return null;
  return { name: NOTE_NAMES[r%12]+(Math.floor(r/12)-1), cents:(midi-r)*100 };
}

// ── Auto-zoom: smooth freq range update ───────────────────
function updateFreqRange(freq) {
  if (!freq) return;
  // Show from slightly below fundamental to just above 8th harmonic
  const lo = freq * 0.7;
  const hi = freq * 8.5;
  targetFreqLo = lo;
  targetFreqHi = hi;
}

// Smooth zoom interpolation
function smoothZoom() {
  const alpha = 0.04; // slow smooth
  dispFreqLo += (targetFreqLo - dispFreqLo) * alpha;
  dispFreqHi += (targetFreqHi - dispFreqHi) * alpha;
}

// ── Render loop ────────────────────────────────────────────
function renderLoop() {
  rafId = requestAnimationFrame(renderLoop);
  if (!analyser||!fftData) return;
  const sr = audioCtx?.sampleRate||44100;
  analyser.getFloatFrequencyData(fftData);

  let peak=-Infinity;
  for (let i=0;i<fftData.length;i++) if(fftData[i]>peak) peak=fftData[i];
  updateLevel(peak);

  const freq = detectPitch(fftData, sr);
  if (freq) {
    currentFreq = freq;
    updateNoteDisplay(freq);
    updateFreqRange(freq);
  }
  smoothZoom();

  const binSize = sr / FFT_SIZE;

  // Beat detection per harmonic
  for (let h=0; h<NUM_H; h++) {
    const hFreq = currentFreq ? currentFreq*(h+1) : null;
    const beat  = detectBeat(fftData, sr, hFreq);
    if (beat!==null) {
      beatNullCount[h]=0;
      beatHistory[h].push(beat);
      if (beatHistory[h].length>BEAT_SMOOTH) beatHistory[h].shift();
      statusVals[h] = beat<0.08?2:beat<0.6?1:0;
    } else {
      beatNullCount[h]++;
      if (beatNullCount[h]>BEAT_NULL_THRESH) { beatHistory[h]=[]; statusVals[h]=0; }
    }
  }

  drawSpectroColumn(binSize);
  updateBeatDisplay();
  updateFreqAxisLabels();
}

// ── Single spectrogram column ──────────────────────────────
function drawSpectroColumn(binSize) {
  if (!offCanvas||!offCtx) return;
  const W   = offCanvas.width;
  const H   = offCanvas.height;
  const dpr = window.devicePixelRatio||1;
  const shift = SCROLL_SPD * dpr;

  // Scroll left
  offCtx.drawImage(offCanvas, -shift, 0);

  // New column on right edge using ImageData for per-pixel precision
  const colW = Math.ceil(shift) + 1;
  const colX = W - colW;
  const img  = offCtx.createImageData(colW, H);
  const d    = img.data;

  for (let py = 0; py < H; py++) {
    // Map pixel row → frequency (bottom = low, top = high)
    const frac = 1 - py / H;
    const freq = dispFreqLo + frac * (dispFreqHi - dispFreqLo);
    const bin  = Math.round(freq / binSize);
    const db   = (bin >= 0 && bin < fftData.length) ? fftData[bin] : -96;
    const [r,g,b] = dbToRGB(db);
    for (let px = 0; px < colW; px++) {
      const i = (py * colW + px) * 4;
      d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=255;
    }
  }
  offCtx.putImageData(img, colX, 0);

  // Harmonic frequency lines (faint horizontal)
  if (currentFreq) {
    for (let h=0; h<NUM_H; h++) {
      const hf  = currentFreq * (h+1);
      const frac = (hf - dispFreqLo) / (dispFreqHi - dispFreqLo);
      if (frac < 0 || frac > 1) continue;
      const py  = H * (1 - frac);
      const selected = selH[h];
      offCtx.strokeStyle = selected ? "rgba(200,255,0,0.5)" : "rgba(255,220,0,0.18)";
      offCtx.lineWidth   = selected ? 1.5*dpr : dpr;
      offCtx.beginPath();
      offCtx.moveTo(colX, py);
      offCtx.lineTo(colX+colW, py);
      offCtx.stroke();
    }
  }

  // Blit to visible canvas
  spectroCtx.drawImage(offCanvas, 0, 0);
}

// ── Freq axis labels ───────────────────────────────────────
let lastAxisUpdate = 0;
function updateFreqAxisLabels() {
  const now = Date.now();
  if (now - lastAxisUpdate < 500) return; // update every 500ms
  lastAxisUpdate = now;

  freqAxisEl.innerHTML = "";
  const H = spectroCanvas.clientHeight || 300;

  // Draw harmonic lines as labels
  if (currentFreq) {
    for (let h=0; h<NUM_H; h++) {
      const hf   = currentFreq * (h+1);
      const frac = (hf - dispFreqLo) / (dispFreqHi - dispFreqLo);
      if (frac < 0.01 || frac > 0.99) continue;
      const y    = H * (1 - frac);
      const lbl  = document.createElement("div");
      lbl.className = "freq-label";
      lbl.style.top  = y + "px";
      lbl.style.color = selH[h] ? "rgba(200,255,0,0.8)" : "rgba(255,220,100,0.4)";
      lbl.textContent = `H${h+1} ${hf.toFixed(0)}Hz`;
      freqAxisEl.appendChild(lbl);
    }
  }
}

// ── Beat display ───────────────────────────────────────────
function updateBeatDisplay() {
  let anySelected = false;
  for (let h=0; h<NUM_H; h++) {
    const on   = selH[h];
    const card = beatCards[h];
    const valEl= document.getElementById(`bcv${h}`);
    const hist = beatHistory[h];
    const st   = statusVals[h];

    card.style.display = on ? "block" : "none";
    if (on) {
      anySelected = true;
      const col = st===2?"#00ff55":st===1?"#ffdd00":"#ff8844";
      card.style.borderColor = st===2?"#00cc44":st===1?"#cc9900":"#333";
      valEl.style.color = col;
      if (hist.length===0) {
        valEl.textContent="—";
      } else {
        const avg = hist.reduce((a,v)=>a+v,0)/hist.length;
        valEl.textContent = avg<0.005?"0.00":avg.toFixed(2);
      }
    }
  }
  document.getElementById("beat-bar-empty").style.display = anySelected?"none":"block";
}

// ── Harmonic toggle ────────────────────────────────────────
function toggleH(h) {
  selH[h] = !selH[h];
  hsBtns[h].className = "hs-btn" + (selH[h]?" selected":"");
}

// ── Note / level display ───────────────────────────────────
function updateNoteDisplay(freq) {
  const note=freqToNote(freq);
  const nb=document.getElementById("note-big");
  const ns=document.getElementById("note-sub");
  if (note) {
    nb.textContent=note.name; nb.style.color="#fff";
    ns.textContent=`${freq.toFixed(2)} Hz  ${note.cents>=0?"+":""}${note.cents.toFixed(1)}¢`;
    ns.style.color="#aaa";
  } else {
    nb.textContent="—"; nb.style.color="#444";
    ns.textContent="— Hz"; ns.style.color="#444";
  }
}

function updateLevel(db) {
  const pct=Math.max(0,Math.min(100,(db+96)/96*100));
  document.getElementById("level-bar").style.width=pct+"%";
  document.getElementById("level-db").textContent=isFinite(db)?db.toFixed(1)+" dB":"— dB";
}

function resetState() {
  currentFreq=null;
  statusVals=new Array(NUM_H).fill(0);
  beatHistory=Array.from({length:NUM_H},()=>[]);
  beatNullCount=new Array(NUM_H).fill(0);
  dispFreqLo=20; dispFreqHi=4000;
  targetFreqLo=20; targetFreqHi=4000;
  updateNoteDisplay(null); updateLevel(-Infinity); updateBeatDisplay();
}

// ── Sliders ────────────────────────────────────────────────
document.getElementById("sl-gain").addEventListener("input",function(){
  gainVal=parseFloat(this.value);
  document.getElementById("vl-gain").textContent=gainVal.toFixed(1);
  if(gainNode) gainNode.gain.value=gainVal;
});
document.getElementById("sl-sens").addEventListener("input",function(){
  sensVal=parseFloat(this.value);
  document.getElementById("vl-sens").textContent=sensVal.toFixed(2);
});
</script>

</body>
</html>
