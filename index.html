<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Unison Analyzer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: #111; color: #fff;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  font-size: 13px; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
/* The original single-screen layout (header through bottom-overlay) is
kept exactly as before, pinned to one full viewport height. Anything
added below it (like the sound level history) extends the page and is
reached by scrolling, without shrinking this area at all. */
#app-viewport {
height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden;
}

/* Header */
#header {
background: #1a1a1a; border-bottom: 1px solid #333;
padding: calc(4px + env(safe-area-inset-top)) 12px 4px 12px; display: flex; flex-direction: column;
gap: 3px; flex-shrink: 0;
}
#title-row {
display: flex; align-items: center;
justify-content: center; position: relative;
}
#app-title { font-size: 15px; font-weight: 600; letter-spacing: 1px; color: #fff; }
#mic-btn {
position: absolute; right: 0;
background: #2a0808; border: 1.5px solid #882;
border-radius: 7px; color: #f55; font-size: 11px;
font-family: -apple-system, sans-serif; padding: 3px 10px;
cursor: pointer; -webkit-appearance: none;
transition: all 0.15s; min-width: 76px; text-align: center;
}
#mic-btn.on { background: #0a1a2a; border-color: #2255aa; color: #88aaff; }

#info-bar {
display: flex; align-items: center; gap: 14px;
padding: 2px 2px;
}
#note-group {
display: flex; align-items: baseline; gap: 6px; flex: 1; min-width: 0;
}
#note-big { font-size: 26px; font-weight: bold; color: #fff; line-height: 1; flex-shrink: 0; }
#note-sub { font-size: 10px; color: #ddd; flex-shrink: 0; }
#level-group {
width: 150px; flex-shrink: 0; display: flex; align-items: center; gap: 6px; min-width: 0;
}
#level-label { font-size: 10px; color: #ddd; flex-shrink: 0; }
#level-db { font-size: 10px; color: #ddd; flex-shrink: 0; }
#level-bar-wrap {
flex: 1; height: 8px; background: #000; border-radius: 3px;
overflow: hidden; border: 1px solid #333; min-width: 0;
}
#level-bar { height: 100%; width: 0%; background: linear-gradient(to right, #0c0, #aa0, #c00); transition: width 0.05s; }

/* Section label */
.section-label {
background: #1a1a1a; border-top: 1px solid #333; border-bottom: 1px solid #333;
padding: 4px 12px; font-size: 11px; color: #ddd;
display: flex; justify-content: space-between; align-items: center;
flex-shrink: 0;
}

/* Harmonic select */
#harmonic-select {
background: #161616; border-bottom: 1px solid #2a2a2a;
padding: 6px 10px; display: flex; gap: 5px;
align-items: center; flex-shrink: 0;
}
#harmonic-select .hs-label { font-size: 11px; color: #ccc; flex-shrink: 0; margin-right: 2px; }
.hs-btn {
flex: 1; background: #1a1a1a; border: 1.5px solid #2a2a2a;
border-radius: 6px; color: #ccc; font-size: 12px;
font-family: -apple-system, sans-serif; padding: 6px 2px;
cursor: pointer; -webkit-appearance: none; text-align: center;
transition: all 0.15s; user-select: none;
}
.hs-btn.selected { background: #0a2a10; border-color: #00cc44; color: #00ff55; }

/* Spectrogram */
#spectro-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; position: relative; }

/* Bottom overlay block: holds the beat-bar + controls. When one or
more harmonics are selected, #controls is hidden entirely so the
spectrogram keeps as much vertical space as possible. */
#bottom-overlay {
display: flex; flex-direction: column; flex-shrink: 0;
}
#spectro-outer { flex: 1; display: flex; overflow: hidden; min-height: 0; position: relative; }
#freq-ruler {
width: 52px; flex-shrink: 0; position: relative;
background: #0a0a0a; border-right: 1px solid #222; overflow: hidden;
}
.ruler-label {
position: absolute; right: 4px; font-size: 10px; color: #ccc;
transform: translateY(-50%); white-space: nowrap;
}
.ruler-tick {
position: absolute; right: 0; width: 6px; height: 1px;
background: #555; transform: translateY(-50%);
}
#spectro-canvas-wrap {
flex: 1; position: relative; overflow: hidden; touch-action: none;
}
#spectro-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#timeline-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#freq-axis { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.freq-label {
position: absolute; left: 4px; font-size: 11px; font-weight: 600;
color: #fff; background: rgba(0,0,0,0.55); padding: 0 3px;
border-radius: 2px; transform: translateY(-50%); white-space: nowrap; z-index: 10;
}

/* dB scale */
#db-scale {
width: 32px; flex-shrink: 0; display: flex; flex-direction: column;
padding: 2px 0; background: #000; border-left: 1px solid #222; position: relative;
}
#db-gradient {
flex: 1; margin: 0 6px;
background: linear-gradient(to bottom,
#ff0000 0%, #ff4400 8%, #ff8800 16%, #ffcc00 25%,
#aaff00 35%, #00ff88 45%, #00ccff 55%, #0066ff 70%, #0000aa 85%, #000033 100%);
border-radius: 2px; position: relative;
}
.db-tick { position: absolute; right: -18px; font-size: 8px; color: #aaa; transform: translateY(-50%); white-space: nowrap; }

/* Beat bar */
#beat-bar {
background: #1a1a1a; border-top: 1px solid #333;
padding: 4px 10px; display: flex; gap: 5px; flex-wrap: wrap;
min-height: 39px; align-items: center; flex-shrink: 0;
}
#beat-bar-empty { font-size: 11px; color: #bbb; width: 100%; text-align: center; }
.beat-card {
flex: 1; min-width: 56px; background: #111; border: 1px solid #2a2a2a;
border-radius: 5px; padding: 3px 3px; text-align: center; transition: border-color 0.2s;
}
.beat-card .bc-h { font-size: 8px; color: #ccc; }
.beat-card .bc-val { font-size: 14px; font-weight: bold; line-height: 1.1; }
.beat-card .bc-unit { font-size: 7px; color: #ccc; }
.beat-card .bc-dur { font-size: 8px; color: #6a9; margin-top: 1px; }

/* Controls */
#controls {
background: #1a1a1a; border-top: 1px solid #333;
padding: 8px 12px; display: flex; flex-direction: column;
gap: 8px; flex-shrink: 0;
}
.ctrl-row { display: flex; align-items: center; gap: 8px; }
.ctrl-label { font-size: 11px; color: #ccc; min-width: 50px; letter-spacing: 0.5px; }
.ctrl-row input[type=range] { flex: 1; accent-color: #3355cc; height: 22px; }
.ctrl-val { font-size: 11px; color: #ddd; min-width: 60px; text-align: center; }
.ctrl-btn {
background: #1a1a2a; border: 1px solid #334; border-radius: 5px;
color: #88aaff; font-size: 11px; padding: 4px 8px;
cursor: pointer; -webkit-appearance: none; flex-shrink: 0;
touch-action: manipulation;
}
.ctrl-btn-wide {
min-width: 44px; padding: 6px 10px; font-size: 18px; font-weight: bold;
line-height: 1; touch-action: manipulation;
}
.toggle-switch {
width: 36px; height: 20px; border-radius: 10px; background: #333;
position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
}
.toggle-knob {
position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
border-radius: 50%; background: #fff; transition: left 0.2s;
}
#btn-sustain-stop {
display: none; background: #2a0808; border: 1.5px solid #a33;
color: #ff8888; font-weight: bold;
}

/* Sound level history */
#level-history-section { flex-shrink: 0; display: flex; flex-direction: column; }
#level-history-stats { display: flex; gap: 12px; font-size: 10px; color: #ccc; }
#level-history-stats b { font-size: 12px; }
#level-history-wrap { height: 336px; position: relative; background: #000; flex-shrink: 0; }
#level-history-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

</style>

</head>
<body>

<div id="app-viewport">
<div id="header">
  <div id="title-row">
    <span id="app-title">UNISON ANALYZER</span>
    <button id="mic-btn">🔇 MIC OFF</button>
  </div>
  <div id="info-bar">
    <div id="note-group">
      <span id="note-big">—</span>
      <span id="note-sub" style="color:#bbb">— Hz</span>
    </div>
    <div id="level-group">
      <span id="level-label">Input Level</span>
      <span id="level-db">— dB</span>
      <div id="level-bar-wrap"><div id="level-bar"></div></div>
    </div>
  </div>
</div>

<div class="section-label">
  <span>FFT / Spectrogram (H1–H8)</span>
  <div style="display:flex;align-items:center;gap:6px;">
    <span id="tags-label" style="font-size:10px;color:#ccc;">TAGS</span>
    <div id="tags-toggle" style="width:36px;height:20px;border-radius:10px;background:#446622;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;">
      <div id="tags-knob" style="position:absolute;top:2px;left:18px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left 0.2s;"></div>
    </div>
    <span id="scale-label" style="font-size:10px;color:#ccc;">LIN</span>
    <div id="scale-toggle" style="width:36px;height:20px;border-radius:10px;background:#446622;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;">
      <div id="scale-knob" style="position:absolute;top:2px;left:18px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left 0.2s;"></div>
    </div>
    <span id="view-label" style="font-size:10px;color:#ccc;">SPEC</span>
    <div id="view-toggle" class="toggle-switch">
      <div id="view-knob" class="toggle-knob"></div>
    </div>
    <span id="sr-label" style="font-size:10px;color:#ccc;">44100 Hz</span>
  </div>
</div>

<div id="harmonic-select">
  <span class="hs-label">Select:</span>
</div>

<div id="spectro-section">
  <div id="spectro-outer">
    <div id="freq-ruler"></div>
    <div id="spectro-canvas-wrap">
      <canvas id="spectro-canvas"></canvas>
      <canvas id="timeline-canvas" style="display:none;"></canvas>
      <div id="freq-axis"></div>
    </div>
    <div id="db-scale">
      <div style="font-size:8px;color:#ddd;text-align:center;padding-top:2px;flex-shrink:0;">0</div>
      <div id="db-gradient">
        <div class="db-tick" style="top:12%">-12</div>
        <div class="db-tick" style="top:25%">-24</div>
        <div class="db-tick" style="top:37%">-36</div>
        <div class="db-tick" style="top:50%">-48</div>
        <div class="db-tick" style="top:62%">-60</div>
        <div class="db-tick" style="top:75%">-72</div>
        <div class="db-tick" style="top:87%">-84</div>
      </div>
      <div style="font-size:8px;color:#ddd;text-align:center;padding-bottom:2px;flex-shrink:0;">-96</div>
    </div>
  </div>
</div>

<div id="bottom-overlay">
  <div class="section-label">
    <span>Beat Frequency — Selected Harmonics</span>
    <div style="display:flex;align-items:center;gap:6px;">
      <button id="btn-sustain-stop" class="ctrl-btn">⏹ STOP</button>
      <span id="sustain-label" style="font-size:10px;color:#ccc;">SUSTAIN</span>
      <div id="sustain-toggle" class="toggle-switch">
        <div id="sustain-knob" class="toggle-knob"></div>
      </div>
    </div>
  </div>
  <div id="beat-bar"><span id="beat-bar-empty">Select a harmonic above to show beat frequency</span></div>
  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">GAIN</span>
      <input type="range" id="sl-gain" min="10" max="90" step="1" value="20">
      <span class="ctrl-val" id="vl-gain">20 dB</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">A4 REF</span>
      <button id="btn-ref-down" class="ctrl-btn ctrl-btn-wide">−</button>
      <span class="ctrl-val" id="vl-ref">442.0 Hz</span>
      <button id="btn-ref-up" class="ctrl-btn ctrl-btn-wide">＋</button>
      <button id="btn-ref-reset" class="ctrl-btn">442</button>
    </div>
  </div>
</div>
</div>

<div id="level-history-section">
  <div class="section-label">
    <span>Sound Level</span>
    <div id="level-history-stats">
      <span>MIN <b id="lvl-min" style="color:#4af">— dB</b></span>
      <span>AVG <b id="lvl-avg" style="color:#8f8">— dB</b></span>
      <span>MAX <b id="lvl-max" style="color:#f66">— dB</b></span>
    </div>
  </div>
  <div id="level-history-wrap">
    <canvas id="level-history-canvas"></canvas>
  </div>
</div>

<script>
const NOTE_NAMES     = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FFT_SIZE       = 8192;
const NUM_H          = 8;
const BEAT_SMOOTH    = 60; // 平均化する直近フレーム数。大きいほど数値の変化がゆっくり滑らかになる
const BEAT_NULL_THRESH = 30;
const SCROLL_SPD     = 1;
const FREQ_LO        = 10;
const FREQ_HI        = 10000;
const REF_PITCH_DEFAULT = 442.0;
const REF_PITCH_MIN     = 420.0;
const REF_PITCH_MAX     = 450.0;
const REF_PITCH_STEP    = 0.1;

// ── Mutable state ──────────────────────────────────────────
let micOn        = false;
let gainVal      = 5.0;
let spectroGain  = 20;  // match reference app 20.3dB
let refPitch     = REF_PITCH_DEFAULT;
let logScale     = false; // default linear like reference app
let showTags     = true;  // whether H1–H8 harmonic frequency tags are drawn on the spectrogram
let viewMode     = 'spec'; // 'spec' (heatmap) or 'timeline' (per-harmonic sounding bars)
let sustainMode  = false; // when off, duration tracking/display is fully hidden; when on, duration
                           // starts automatically on note onset and is frozen only by the manual Stop button
let selH         = new Array(NUM_H).fill(false);
let beatHistory  = Array.from({length:NUM_H}, ()=>[]);
let beatNullCount= new Array(NUM_H).fill(0);
let statusVals   = new Array(NUM_H).fill(0);
let currentFreq  = null;
// Actual (peak-snapped) harmonic frequencies, refreshed each frame.
// Real piano strings are inharmonic — overtones run slightly sharp of
// exact integer multiples of the fundamental, increasingly so for
// higher harmonics — so the tags/guide-lines are snapped to the
// nearest real spectral peak near each theoretical h*f0 position
// rather than drawn at the theoretical position itself.
let harmonicFreqRefined = new Array(NUM_H).fill(null);
let pendingFreq  = null; // candidate new pitch awaiting confirmation across several frames
let pendingCount = 0;    // how many consecutive frames have agreed with pendingFreq
let viewLo       = 0;
let viewHi       = 4200; // default range matches reference app

// Amplitude envelope peak-interval tracking, per harmonic.
// We track the dB value of the harmonic each frame, detect local
// maxima (peaks) in that envelope over time, and use the time gap
// between consecutive peaks as the beat period.
let ampEnv       = Array.from({length:NUM_H}, ()=>[]); // recent [{t, db}] samples
let lastPeakTime = new Array(NUM_H).fill(null);  // timestamp of most recent confirmed peak
let lastBeatRate = new Array(NUM_H).fill(null);  // last computed beat/s
let lastTroughDb = new Array(NUM_H).fill(null);  // dB value at the most recent local minimum of the envelope
let noteStartTime= new Array(NUM_H).fill(null);  // when this harmonic's envelope tracking began (for first-peak fallback)
let ampNullCount = new Array(NUM_H).fill(0);
let noteDuration = new Array(NUM_H).fill(null);  // seconds from onset to the manual Stop (held until next note starts)
let noteIsActive = new Array(NUM_H).fill(false); // whether this harmonic is currently being timed (sustain mode)
let noteOnsetTime= new Array(NUM_H).fill(null);  // performance.now() timestamp when current note started sounding
let hysteresisOn = new Array(NUM_H).fill(false); // latch: true once loud enough to start (sustain mode only)

// Timeline view state: independent of Sustain Mode / harmonic selection.
// Tracks, per harmonic, whether it's currently "sounding" (continuous bar)
// and whether it's currently in a beat/warble trough (drawn as a pinch/notch
// in the bar rather than a break, since the note hasn't actually died out).
let timelineOn           = new Array(NUM_H).fill(false);
let timelineDbHeld       = new Array(NUM_H).fill(-96); // slow-release smoothed level, drives both on/off and bar thickness
const TIMELINE_RELEASE_DB_PER_FRAME = 1.2; // dB/frame decay — bridges brief detection dropouts without a real gap

const ENV_KEEP_MS  = 3000;  // how much recent envelope history we need to detect a local max
const PEAK_MIN_GAP_MS = 100; // ~10 Hz ceiling — refuse peaks closer together than this
const ONSET_DB_THRESHOLD = -40; // must reach at least this loud to be considered "sounding" (sustain start)
const STOP_DB_THRESHOLD  = -75; // reference floor value (manual Stop button is the actual trigger in sustain mode)
// Timeline view reuses the existing GAIN slider (spectroGain) for its
// sensitivity, rather than a dedicated control — raising GAIN also
// lowers the effective level needed for a harmonic to register as
// "on" in the timeline, same intuition as it brightening quiet
// signals in the spectrogram. STOP trails 1dB below onset so the
// on/off latch doesn't chatter right at the boundary.
function timelineOnsetDb() { return -96 + spectroGain; }
function timelineStopDb()  { return timelineOnsetDb() - 1; }

let audioCtx=null, analyser=null, gainNode=null, stream=null, fftData=null, timeData=null, rafId=null;
let offCanvas=null, offCtx=null;
let lastAxisUpdate = 0;
let blackmanWin = null;

// Sound level history strip-chart state
const levelHistCanvas = document.getElementById("level-history-canvas");
const levelHistCtx    = levelHistCanvas.getContext("2d");
let levelMin=null, levelMax=null, levelSum=0, levelCount=0;

// ── Colour map (matches reference app exactly) ─────────────
// Reference: background=cyan(-60dB), signal=yellow-red(-40~0dB)
function dbToRGB(db) {
  const boosted = db + spectroGain;
  let t = Math.max(0, Math.min(1, (boosted + 96) / 96));
  // ガンマ補正: ノイズフロア付近(低t)を暗い青/黒側へさらに圧縮し、
  // 真のピーク(高t)はほぼそのまま保つ。これにより参考アプリのような
  // 「無地で暗い背景＋くっきり濃い帯」のコントラストになる。
  t = Math.pow(t, 1.6);
  // 0.00-0.20: black → dark blue
  // 0.20-0.40: dark blue → blue → cyan  ← noise floor
  // 0.40-0.55: cyan → yellow-green
  // 0.55-0.70: yellow-green → yellow
  // 0.70-0.85: yellow → orange → red
  // 0.85-1.00: red → dark red
  if (t < 0.20) {
    const s = t/0.20;
    return [0, Math.round(s*80), Math.round(s*160)];
  } else if (t < 0.40) {
    const s = (t-0.20)/0.20;
    return [0, Math.round(80+s*175), Math.round(160+s*95)];
  } else if (t < 0.55) {
    const s = (t-0.40)/0.15;
    return [Math.round(s*100), 255, Math.round(255-s*255)];
  } else if (t < 0.70) {
    const s = (t-0.55)/0.15;
    return [Math.round(100+s*155), 255, 0];
  } else if (t < 0.85) {
    const s = (t-0.70)/0.15;
    return [255, Math.round(255-s*200), 0];
  } else {
    const s = (t-0.85)/0.15;
    return [255, Math.round(55-s*55), 0];
  }
}

// ── Freq ↔ Y ───────────────────────────────────────────────
function freqToY(freq, H) {
  if (logScale) {
    const lo = Math.log2(Math.max(1, viewLo));
    const hi = Math.log2(viewHi);
    const f  = Math.log2(Math.max(1, Math.min(viewHi, Math.max(viewLo, freq))));
    return H * (1 - (f - lo) / (hi - lo));
  } else {
    return H * (1 - (Math.max(viewLo, Math.min(viewHi, freq)) - viewLo) / (viewHi - viewLo));
  }
}
function yToFreq(y, H) {
  if (logScale) {
    const lo = Math.log2(Math.max(1, viewLo));
    const hi = Math.log2(viewHi);
    return Math.pow(2, lo + (1 - y/H) * (hi - lo));
  } else {
    return viewLo + (1 - y/H) * (viewHi - viewLo);
  }
}

// When a genuinely new note is confirmed (see renderLoop), shift the
// visible spectrogram range — WITHOUT changing the current zoom level
// — so the fundamental (H1) is guaranteed to be on screen, instead of
// requiring a manual scroll after every new note. Only shifts if the
// fundamental isn't already comfortably visible, so it doesn't jump
// around during normal sustained playing within the current view.
function autoScrollToFundamental() {
  if (currentFreq === null) return;
  const floor = logScale ? FREQ_LO : 0;
  const margin = logScale
    ? (Math.log2(viewHi) - Math.log2(Math.max(1,viewLo))) * 0.08
    : (viewHi - viewLo) * 0.08;
  if (logScale) {
    const logLo = Math.log2(Math.max(1,viewLo)), logHi = Math.log2(viewHi);
    const logCur = Math.log2(Math.max(1,currentFreq));
    if (logCur >= logLo+margin && logCur <= logHi-margin) return; // already comfortably visible
    const range = logHi-logLo;
    let newLogLo = logCur - margin, newLogHi = newLogLo + range;
    let lo = Math.pow(2, newLogLo), hi = Math.pow(2, newLogHi);
    if (lo < floor) { lo=floor; hi=Math.pow(2, Math.log2(lo)+range); }
    if (hi > FREQ_HI) { hi=FREQ_HI; lo=Math.pow(2, Math.log2(hi)-range); }
    if (lo < floor) lo = floor;
    viewLo = lo; viewHi = hi;
  } else {
    if (currentFreq >= viewLo+margin && currentFreq <= viewHi-margin) return; // already comfortably visible
    const range = viewHi-viewLo;
    let lo = currentFreq - margin, hi = lo + range;
    if (lo < floor) { lo=floor; hi=lo+range; }
    if (hi > FREQ_HI) { hi=FREQ_HI; lo=hi-range; }
    if (lo < floor) lo = floor;
    viewLo = lo; viewHi = hi;
  }
  if (offCtx && offCanvas) { offCtx.fillStyle="#000"; offCtx.fillRect(0,0,offCanvas.width,offCanvas.height); }
  lastAxisUpdate = 0;
}

// ── Build UI ───────────────────────────────────────────────
const hsBtns   = [];
const beatCards= [];
const hSelWrap = document.getElementById("harmonic-select");
const beatBarEl= document.getElementById("beat-bar");

for (let h = 0; h < NUM_H; h++) {
  const btn = document.createElement("button");
  btn.className = "hs-btn";
  btn.textContent = "H"+(h+1);

// ── Touch: 1-finger scroll + pinch zoom ───────────────────
let pinchDist0=null, pinchLo0=null, pinchHi0=null, pinchCF=null;
let scrollY0=null, scrollLo0=null, scrollHi0=null;

const swrap = document.getElementById("spectro-canvas-wrap");
swrap.addEventListener("touchstart", e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    scrollY0  = e.touches[0].clientY;
    scrollLo0 = viewLo;
    scrollHi0 = viewHi;
    pinchDist0= null;
  } else if (e.touches.length === 2) {
    scrollY0  = null;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist0= Math.sqrt(dx*dx+dy*dy);
    pinchLo0  = viewLo;
    pinchHi0  = viewHi;
    const rect= spectroCanvas.getBoundingClientRect();
    const midY= (e.touches[0].clientY+e.touches[1].clientY)/2 - rect.top;
    pinchCF   = yToFreq(midY, rect.height);
  }
}, {passive:false});

swrap.addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length === 1 && scrollY0 !== null) {
    const rect = spectroCanvas.getBoundingClientRect();
    const H    = rect.height;
    const curY = e.touches[0].clientY;
    const dragPx = curY - scrollY0;
    scrollY0 = curY; // incremental: always diff against the previous frame, never a stale start point

    if (logScale) {
      // Work in log2 space, which is what actually maps linearly to
      // pixel position on screen when logScale is active.
      // Sensitivity is proportional to the CURRENT zoomed range (not
      // the full 10Hz–10kHz range): dragging the full screen height
      // pans by exactly one screen's worth of visible range, at any
      // zoom level. A fixed full-range sensitivity was tried
      // previously, but at high zoom it made every small drag jump by
      // a huge amount relative to the (now tiny) visible window,
      // making it effectively impossible to fine-tune the scroll
      // position (e.g. landing precisely on 0Hz–200Hz).
      const logLo0 = Math.log2(Math.max(1, viewLo));
      const logHi0 = Math.log2(viewHi);
      const logRange = logHi0 - logLo0;
      const shift = (dragPx / H) * logRange;
      let logLo = logLo0 + shift, logHi = logHi0 + shift;
      let lo = Math.pow(2, logLo), hi = Math.pow(2, logHi);
      if (lo < FREQ_LO) { lo = FREQ_LO; hi = Math.pow(2, Math.log2(lo) + logRange); }
      if (hi > FREQ_HI) { hi = FREQ_HI; lo = Math.pow(2, Math.log2(hi) - logRange); }
      if (lo < FREQ_LO) lo = FREQ_LO;
      viewLo = lo; viewHi = hi;
    } else {
      // Same proportional-sensitivity approach for linear mode.
      // LIN mode's true floor is 0Hz (not FREQ_LO, which exists only
      // because log2(0) is undefined for LOG mode).
      const LIN_FLOOR = 0;
      const range = viewHi - viewLo;
      const shift = (dragPx / H) * range;
      let lo = viewLo + shift, hi = viewHi + shift;
      if (lo < LIN_FLOOR) { lo=LIN_FLOOR; hi=lo+range; }
      if (hi > FREQ_HI) { hi=FREQ_HI; lo=hi-range; }
      viewLo=lo; viewHi=hi;
    }
    if (offCtx) { offCtx.fillStyle="#000"; offCtx.fillRect(0,0,offCanvas.width,offCanvas.height); }
  } else if (e.touches.length === 2 && pinchDist0 !== null) {
    const dx   = e.touches[0].clientX - e.touches[1].clientX;
    const dy   = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const scale= pinchDist0 / dist;

    if (logScale) {
      const logLo0 = Math.log2(Math.max(1, pinchLo0));
      const logHi0 = Math.log2(pinchHi0);
      const logCF  = Math.log2(Math.max(1, pinchCF));
      const origLogRange = logHi0 - logLo0;
      const newLogRange  = origLogRange * scale;
      let logLo = logCF - newLogRange * ((logCF - logLo0) / origLogRange);
      let logHi = logLo + newLogRange;
      let lo = Math.pow(2, logLo), hi = Math.pow(2, logHi);
      if (lo < FREQ_LO) { lo = FREQ_LO; logLo = Math.log2(lo); hi = Math.pow(2, logLo+newLogRange); }
      if (hi > FREQ_HI) { hi = FREQ_HI; logHi = Math.log2(hi); lo = Math.pow(2, logHi-newLogRange); }
      if (lo < FREQ_LO) lo = FREQ_LO;
      viewLo = lo; viewHi = hi;
    } else {
      const LIN_FLOOR = 0;
      const origRange = pinchHi0 - pinchLo0;
      const newRange  = Math.max(50, Math.min(FREQ_HI-LIN_FLOOR, origRange*scale));
      let lo = pinchCF - newRange * ((pinchCF - pinchLo0) / origRange);
      let hi = lo + newRange;
      if (lo < LIN_FLOOR) { lo=LIN_FLOOR; hi=lo+newRange; }
      if (hi > FREQ_HI) { hi=FREQ_HI; lo=hi-newRange; }
      if (lo < LIN_FLOOR) lo=LIN_FLOOR;
      viewLo=lo; viewHi=hi;
    }
    if (offCtx) { offCtx.fillStyle="#000"; offCtx.fillRect(0,0,offCanvas.width,offCanvas.height); }
  }
}, {passive:false});

swrap.addEventListener("touchend", e => {
  if (e.touches.length === 0) { scrollY0=null; pinchDist0=null; }
  else if (e.touches.length === 1) {
    pinchDist0=null;
    scrollY0=e.touches[0].clientY; scrollLo0=viewLo; scrollHi0=viewHi;
  }
});
swrap.addEventListener("touchcancel", e => {
  // Safari can fire touchcancel instead of touchend on interrupted
  // gestures (notifications, screenshots, etc). Always fully reset so
  // a stale scrollY0/pinchDist0 doesn't break the next gesture.
  scrollY0=null; pinchDist0=null;
});

// ── Prevent double-tap-to-zoom across the whole app ────────
// viewport's user-scalable=no is not always honored by iOS Safari for
// the double-tap gesture specifically (as opposed to pinch), so this
// is enforced explicitly. Only swallow the touchend when two taps land
// close together BOTH in time (<=300ms) AND in screen position
// (<=24px) — this is what an actual double-tap-zoom gesture looks
// like. A time-only check would also suppress the synthetic "click"
// event that unrelated buttons rely on whenever two ordinary taps in
// different places happen to fall within 300ms of each other.
let lastTouchEndTime = 0, lastTouchEndX = 0, lastTouchEndY = 0;
document.addEventListener("touchend", function(e) {
  const now = Date.now();
  const touch = e.changedTouches && e.changedTouches[0];
  const x = touch ? touch.clientX : 0;
  const y = touch ? touch.clientY : 0;
  const dx = x - lastTouchEndX, dy = y - lastTouchEndY;
  const closeInSpace = (dx*dx + dy*dy) <= (24*24);
  if (now - lastTouchEndTime <= 300 && closeInSpace) {
    e.preventDefault();
  }
  lastTouchEndTime = now; lastTouchEndX = x; lastTouchEndY = y;
}, {passive:false});
// Also block pinch-style gesture zoom (gesturestart fires on iOS Safari
// even with user-scalable=no in some versions/webview contexts).
document.addEventListener("gesturestart", function(e) { e.preventDefault(); }, {passive:false});

// ── Goertzel: 任意周波数での振幅を直接計算（ゼロパディングFFT相当の精度）──
// HPSで求めた粗い周波数推定値の近傍を、binという離散グリッドに縛られず
// 任意の実数周波数で直接評価できる。低音域(C2など)でbin幅が粗いとき
// パラボリック補間だけでは精度が不足するため、これで追い込む。
function goertzelMag(samples, win, freq, sr) {
  const N = samples.length;
  const k = freq * N / sr; // 整数binである必要はない
  const w = 2 * Math.PI * k / N;
  const cosine = Math.cos(w), sine = Math.sin(w), coeff = 2 * cosine;
  let s0 = 0, s1 = 0, s2 = 0;
  for (let i = 0; i < N; i++) {
    s0 = samples[i] * win[i] + coeff * s1 - s2;
    s2 = s1; s1 = s0;
  }
  const real = s1 - s2 * cosine;
  const imag = s2 * sine;
  return Math.sqrt(real * real + imag * imag);
}

// 黄金分割探索でHPS推定値の±1bin範囲内の真のピークを追い込む
function refineFreqGoertzel(samples, win, sr, freqGuess, binSize) {
  let lo = freqGuess - binSize, hi = freqGuess + binSize;
  const gr = (Math.sqrt(5) - 1) / 2;
  let c = hi - gr * (hi - lo);
  let d = lo + gr * (hi - lo);
  let fc = goertzelMag(samples, win, c, sr);
  let fd = goertzelMag(samples, win, d, sr);
  for (let iter = 0; iter < 16; iter++) {
    if (fc > fd) {
      hi = d; d = c; fd = fc;
      c = hi - gr * (hi - lo);
      fc = goertzelMag(samples, win, c, sr);
    } else {
      lo = c; c = d; fc = fd;
      d = lo + gr * (hi - lo);
      fd = goertzelMag(samples, win, d, sr);
    }
  }
  return (lo + hi) / 2;
}

// ── Pitch detection (HPS + オクターブ補正 + Goertzel精密化) ──
function detectPitch(data, sr, timeSamples) {
  const binSize = sr / FFT_SIZE;
  const lo = Math.floor(27.5/binSize);
  const hi = Math.min(Math.floor(2000/binSize), data.length-1);
  const lin= new Float32Array(data.length);
  for (let i=0; i<data.length; i++) lin[i]=Math.pow(10, data[i]/20);
  let maxVal=0, maxBin=0;
  for (let i=lo; i<=hi; i++) {
    const v = lin[i]*lin[Math.min(i*2,data.length-1)]*lin[Math.min(i*3,data.length-1)]
              *lin[Math.min(i*4,data.length-1)]*lin[Math.min(i*5,data.length-1)];
    if (v>maxVal) { maxVal=v; maxBin=i; }
  }
  if (maxBin===0 || data[maxBin]<-72) return null;

  // --- オクターブ/倍音ロック補正 ---
  // 低音では基音binのエネルギーが弱く、強い倍音位置がHPSで
  // 誤って「基音」と判定されることがある(例: C2弾いてG3=3倍音と
  // 誤検出)。ただし判定が緩すぎると逆に、ノイズフロアの揺らぎを
  // 「基音候補」と誤認して不必要に低い方へシフトしてしまう
  // (例: 68Hzの音を34Hzに誤補正)。そのため:
  //  - 候補は k=2 (最も可能性が高い半分の位置) から先に試す
  //  - ノイズフロアではなく maxBin 自体の強さを基準に、
  //    十分近い強度を持つ場合のみ「独立した基音」とみなす
  //  - 最低4本の倍音が観測できる場合のみ判定（統計的信頼性の確保）
  //  - 一致率のしきい値を厳しくする (0.6 → 0.85)
  const maxBinDb = data[maxBin];
  let correctedBin = maxBin;
  for (let k=2; k<=6; k++) {
    const subBin = Math.round(maxBin/k);
    if (subBin < lo) continue;
    // 候補の基音binが、検出された最強ピークと比べて明らかに弱い場合は
    // 対象外（ノイズやサイドローブの可能性が高い）。
    if (data[subBin] < maxBinDb - 20) continue;
    let coherent=0, total=0;
    for (let m=1; m*subBin<=hi && m<=8; m++) {
      total++;
      if (data[Math.min(m*subBin,data.length-1)] > -78) coherent++;
    }
    if (total>=4 && coherent/total >= 0.85) { correctedBin = subBin; break; }
  }
  maxBin = correctedBin;

  // 粗い推定値（パラボリック補間）
  const prev=maxBin>0?lin[maxBin-1]:lin[maxBin];
  const cur =lin[maxBin];
  const next=maxBin<data.length-1?lin[maxBin+1]:lin[maxBin];
  const denom=prev-2*cur+next;
  const delta=Math.abs(denom)>1e-10?0.5*(prev-next)/denom:0;
  const coarseFreq = (maxBin+Math.max(-0.5,Math.min(0.5,delta)))*binSize;

  // Goertzelで±1bin内を高精度再探索(特に低音で効果大)
  if (timeSamples && blackmanWin) {
    return refineFreqGoertzel(timeSamples, blackmanWin, sr, coarseFreq, binSize);
  }
  return coarseFreq;
}

// Snap a theoretical harmonic frequency (h * fundamental) to the
// nearest real spectral peak nearby, to compensate for piano string
// inharmonicity (real overtones run progressively sharper than exact
// integer multiples as harmonic number increases). Falls back to the
// theoretical frequency itself if no clear peak is found in range.
function refineHarmonicFreq(data, sr, theoreticalFreq, h) {
  if (!theoreticalFreq) return null;
  const binSize = sr/FFT_SIZE;
  const tolHz = Math.max(binSize*3, theoreticalFreq*(0.004+h*0.0035));
  const cBin = Math.round(theoreticalFreq/binSize);
  const wBins = Math.max(2, Math.round(tolHz/binSize));
  const s = Math.max(1, cBin-wBins), e = Math.min(data.length-2, cBin+wBins);
  let bestBin=-1, bestDb=-Infinity;
  for (let i=s;i<=e;i++) {
    if (data[i]>data[i-1] && data[i]>data[i+1] && data[i]>bestDb && data[i]>-85) {
      bestDb=data[i]; bestBin=i;
    }
  }
  return bestBin<0 ? theoreticalFreq : bestBin*binSize;
}

function detectBeat(data, sr, hFreq) {
  if (!hFreq) return null;
  const binSize=sr/FFT_SIZE;
  const winHz=Math.max(12,hFreq*0.012);
  const cBin=Math.round(hFreq/binSize);
  const wBins=Math.max(5,Math.round(winHz/binSize));
  const s=Math.max(1,cBin-wBins), e=Math.min(data.length-2,cBin+wBins);
  const peaks=[];
  for (let i=s;i<=e;i++) {
    if (data[i]>data[i-1]&&data[i]>data[i+1]&&data[i]>-95)
      peaks.push({f:i*binSize,v:data[i]});
  }
  peaks.sort((a,b)=>b.v-a.v);

  if (peaks.length>=2) {
    // Require the two strongest peaks to be clearly separated AND
    // comparable in strength, otherwise this is very likely a
    // sidelobe/noise bump next to a single real peak, not two
    // genuinely detuned strings. Higher harmonics need a stricter
    // bin-separation requirement since sidelobes get denser there.
    const top2 = [peaks[0], peaks[1]];
    top2.sort((a,b)=>a.f-b.f);
    const sepHz   = top2[1].f - top2[0].f;
    const sepBins = sepHz / binSize;
    const lvlDiff = Math.abs(peaks[0].v - peaks[1].v); // dB difference
    if (sepBins >= 4 && lvlDiff <= 10) {
      // Determine direction: the peak above the theoretical reference
      // frequency (hFreq) is taken to be the string being tuned/moved.
      // If that peak sits above hFreq, the beat is reported as
      // positive (sharp); if it sits below, negative (flat).
      const movingPeak = top2[1].f >= hFreq ? top2[1] : top2[0];
      const sign = movingPeak.f >= hFreq ? 1 : -1;
      return { type:"diff", beat: sepHz, signedBeat: sign*sepHz, db: Math.max(peaks[0].v, peaks[1].v) };
    }
    // Fall through to amplitude-modulation tracking using the strongest peak
    return { type:"amp", db: peaks[0].v };
  }
  if (peaks.length===1) {
    return { type:"amp", db: peaks[0].v };
  }
  return null;
}

// Track the amplitude envelope of a harmonic and detect when a new
// local-maximum (peak) occurs in it. Returns the confirmed peak time
// if one was just detected, otherwise null.
//
// env: rolling array of {t, db} samples, newest pushed at the end.
// Raw per-frame dB values are noisy (FFT bin jitter), so we first
// apply light smoothing over a short trailing window, then look for
// a genuine local max in the smoothed curve. We also enforce a
// minimum gap between confirmed peaks corresponding to a realistic
// upper bound on piano beat rates (~10 Hz → 100ms) so that residual
// noise wiggles can't be double-counted as separate beats.
//
// Crucially, a perfectly in-tune unison still has small natural
// amplitude fluctuation (attack transients, slight inharmonicity,
// bow/hammer noise) even though there is truly no beating. To avoid
// reporting a false beat rate in that case, we require the swing
// between the most recent local max and local min to exceed
// MIN_BEAT_SWING_DB before counting it as a genuine beat peak.
const MIN_BEAT_SWING_DB = 4; // dB — minimum envelope peak-to-trough swing to count as a real beat
function smoothedDb(env, idx, halfWin) {
  const s = Math.max(0, idx-halfWin), e = Math.min(env.length-1, idx+halfWin);
  let sum=0, cnt=0;
  for (let i=s;i<=e;i++) { sum+=env[i].db; cnt++; }
  return sum/cnt;
}

function detectEnvelopePeak(env, prevPeakTime, lastTroughDb) {
  const n = env.length;
  const halfWin = 7; // ~15-sample smoothing window
  if (n < halfWin*2+5) return null;
  const idx = n - halfWin - 2;
  const aS = smoothedDb(env, idx-1, halfWin);
  const bS = smoothedDb(env, idx,   halfWin);
  const cS = smoothedDb(env, idx+1, halfWin);
  if (bS >= aS && bS >= cS && bS > aS) {
    // Require a genuine swing in amplitude (not just noise-level jitter)
    // relative to the most recent local minimum we've seen.
    if (lastTroughDb !== null && (bS - lastTroughDb) < MIN_BEAT_SWING_DB) {
      return null;
    }
    const peakTime = env[idx].t;
    if (prevPeakTime === null || (peakTime - prevPeakTime) >= PEAK_MIN_GAP_MS) {
      return peakTime;
    }
  }
  return null;
}

// Detects a local minimum in the smoothed envelope, used purely to
// track the "floor" of the current swing for MIN_BEAT_SWING_DB checks.
function detectEnvelopeTrough(env) {
  const n = env.length;
  const halfWin = 7;
  if (n < halfWin*2+5) return null;
  const idx = n - halfWin - 2;
  const aS = smoothedDb(env, idx-1, halfWin);
  const bS = smoothedDb(env, idx,   halfWin);
  const cS = smoothedDb(env, idx+1, halfWin);
  if (bS <= aS && bS <= cS && bS < aS) return bS;
  return null;
}

function freqToNote(freq) {
  if (!freq||freq<27.5||freq>4978) return null;
  const midi=69+12*Math.log2(freq/refPitch);
  const r=Math.round(midi);
  if (r<33||r>108) return null;
  return {name:NOTE_NAMES[r%12]+(Math.floor(r/12)-1), cents:(midi-r)*100};
}

// ── Render loop ────────────────────────────────────────────
function renderLoop() {
  rafId=requestAnimationFrame(renderLoop);
  if (!analyser||!fftData) return;
  const sr=audioCtx?.sampleRate||44100;
  analyser.getFloatFrequencyData(fftData);
  analyser.getFloatTimeDomainData(timeData);
  let peak=-Infinity;
  for (let i=0;i<fftData.length;i++) if(fftData[i]>peak) peak=fftData[i];
  updateLevel(peak);
  drawLevelHistoryColumn(peak);
  updateLevelStats(peak);

  const freq=detectPitch(fftData,sr,timeData);
  if (freq) {
    // Smooth currentFreq so the H1–H8 guide lines / labels don't jitter
    // frame-to-frame from small pitch-detection noise. A single
    // outlier frame (e.g. a stray octave misdetection) must not be
    // able to snap the display to a new note — we require several
    // consecutive frames agreeing on a new pitch before treating it
    // as a genuine note change. Otherwise we ease toward it slowly.
    if (currentFreq===null) {
      currentFreq = freq;
      pendingFreq = null; pendingCount = 0;
      autoScrollToFundamental();
    } else if (Math.abs(freq-currentFreq)/currentFreq > 0.03) {
      // Candidate "new note" — only accept after it repeats consistently.
      if (pendingFreq !== null && Math.abs(freq-pendingFreq)/pendingFreq < 0.01) {
        pendingCount++;
      } else {
        pendingFreq = freq; pendingCount = 1;
      }
      if (pendingCount >= 4) {
        currentFreq = freq;
        pendingFreq = null; pendingCount = 0;
        autoScrollToFundamental();
      }
      // While unconfirmed, keep showing the previous stable pitch.
    } else {
      currentFreq = currentFreq + (freq-currentFreq)*0.12;
      pendingFreq = null; pendingCount = 0;
    }
    updateNoteDisplay(currentFreq);
  }
  const binSize=sr/FFT_SIZE;
  const now=performance.now();
  for (let h=0;h<NUM_H;h++) {
    const hfTheory=currentFreq?currentFreq*(h+1):null;
    const hf=hfTheory?refineHarmonicFreq(fftData,sr,hfTheory,h):null;
    harmonicFreqRefined[h]=hf;
    const result=detectBeat(fftData,sr,hf);
    const curDb = result ? result.db : -Infinity;

    // Timeline view tracking: independent of Sustain Mode and harmonic
    // selection, always runs so the TIMELINE view is accurate the
    // moment it's switched to. Reuses the same -40dB onset / -75dB
    // silence thresholds as Sustain Mode, but fully automatic (no
    // manual Stop needed) since this is a passive visualization.
    // Rather than reacting to the raw per-frame level (which can dip
    // to silence for a stray frame or two even while a note is
    // clearly still ringing, chopping the bar into slivers), a
    // slow-release "held" level is tracked instead: it jumps up
    // instantly on any louder frame (attack), but only decays a small
    // fixed amount per frame when the raw level is lower (release).
    // This naturally bridges brief detection dropouts, and its
    // continuous value also drives the bar's thickness below.
    if (isFinite(curDb) && curDb > timelineDbHeld[h]) {
      timelineDbHeld[h] = curDb;
    } else {
      timelineDbHeld[h] = Math.max(-96, timelineDbHeld[h] - TIMELINE_RELEASE_DB_PER_FRAME);
    }
    if (timelineDbHeld[h] >= timelineOnsetDb()) timelineOn[h] = true;
    else if (timelineDbHeld[h] < timelineStopDb()) timelineOn[h] = false;
    // else: held level sits between the thresholds — keep whatever
    // on/off state it already had, avoiding flicker right at the edge.

    // Sustain-mode duration tracking. Only runs when sustainMode is
    // enabled — otherwise the whole feature is inert (matches the
    // requirement that nothing is tracked/displayed until turned on).
    // Onset is automatic (hysteresis latch at ONSET_DB_THRESHOLD), but
    // there is no automatic stop: the person presses the Stop button
    // once the sound has died away, which freezes the elapsed time.
    if (sustainMode) {
      if (!hysteresisOn[h] && curDb >= ONSET_DB_THRESHOLD) {
        hysteresisOn[h] = true;
      }
      if (hysteresisOn[h] && !noteIsActive[h]) {
        noteIsActive[h] = true;
        noteOnsetTime[h] = now;
        noteDuration[h] = null; // clear old frozen value now that a new note has begun
      }
    }

    if (result && result.type==="diff") {
      // Two distinct peaks → direct frequency-difference beat rate
      beatNullCount[h]=0;
      beatHistory[h].push(result.signedBeat !== undefined ? result.signedBeat : result.beat);
      if (beatHistory[h].length>BEAT_SMOOTH) beatHistory[h].shift();
      statusVals[h]=result.beat<0.08?2:result.beat<0.6?1:0;
      // Reset envelope tracking since we're in diff mode now
      ampEnv[h]=[]; lastPeakTime[h]=null; noteStartTime[h]=null; ampNullCount[h]=0; lastTroughDb[h]=null;
    } else if (result && result.type==="amp" && selH[h]) {
      // Single peak in frequency domain → this harmonic is "beating"
      // in amplitude over time. Track its envelope and measure the
      // time between successive envelope peaks directly.
      beatNullCount[h]=0;
      ampNullCount[h]=0;
      if (noteStartTime[h]===null) noteStartTime[h]=now;

      ampEnv[h].push({t:now, db:result.db});
      while (ampEnv[h].length && now - ampEnv[h][0].t > ENV_KEEP_MS) ampEnv[h].shift();

      const trough = detectEnvelopeTrough(ampEnv[h]);
      if (trough !== null) lastTroughDb[h] = trough;

      const peakT = detectEnvelopePeak(ampEnv[h], lastPeakTime[h], lastTroughDb[h]);
      if (peakT !== null) {
        if (lastPeakTime[h] !== null) {
          const periodMs = peakT - lastPeakTime[h];
          if (periodMs > 0) {
            const rate = 1000/periodMs;
            lastBeatRate[h] = rate;
            beatHistory[h].push(rate);
            if (beatHistory[h].length>BEAT_SMOOTH) beatHistory[h].shift();
            statusVals[h]=rate<1.5?2:rate<5?1:0;
          }
        }
        lastPeakTime[h] = peakT;
      } else if (lastBeatRate[h] !== null) {
        // No new peak yet this frame — keep showing the last measured rate
        beatHistory[h].push(lastBeatRate[h]);
        if (beatHistory[h].length>BEAT_SMOOTH) beatHistory[h].shift();
      } else if (lastPeakTime[h] === null && noteStartTime[h] !== null) {
        // No peak found yet at all since the note started (still waiting
        // for the very first beat to complete). Per spec: estimate using
        // elapsed time since note onset as a half-period, until either a
        // real peak arrives or the note dies out.
        const elapsedMs = now - noteStartTime[h];
        if (elapsedMs > 30) {
          const estPeriodMs = elapsedMs*2;
          const estRate = 1000/estPeriodMs;
          beatHistory[h].push(estRate);
          if (beatHistory[h].length>BEAT_SMOOTH) beatHistory[h].shift();
        }
      }
    } else {
      // Nothing detected (silence / note has died out)
      beatNullCount[h]++;
      ampNullCount[h]++;
      if (beatNullCount[h]>BEAT_NULL_THRESH) {
        beatHistory[h]=[]; statusVals[h]=0;
        ampEnv[h]=[]; lastPeakTime[h]=null; lastBeatRate[h]=null; noteStartTime[h]=null; lastTroughDb[h]=null;
      }
    }
  }
  if (viewMode === 'spec') {
    drawSpectroColumn(binSize);
  } else {
    drawTimelineColumn();
  }
  updateBeatDisplay();
  updateFreqAxisLabels();
}

// ── Spectrogram ────────────────────────────────────────────
// ── 表示用の周波数方向スムージング ─────────────────────────
// 生のFFTビンをそのまま1ピクセル行に対応させると、ビン幅が画面の
// ピクセル密度より細かい場合に線が1〜2pxしかない細い表示になる。
// リニア(振幅)領域で複数ビンにわたる重み付き移動平均をかけることで、
// ピーク自体の高さはほぼ保ったまま、視覚的な帯の太さを参考アプリ
// 相当(数px〜十数px)に広げる。dB領域で平均すると弱い側に引っ張られて
// ピークが鈍るため、必ずリニア領域で計算してからdBに戻す。
const SMOOTH_RADIUS = 4; // ±4 bin (9-tap) — used at normal/zoomed-out view; shrinks automatically when zoomed in (see estimatePixelsPerBin)
function smoothFreqDataForDisplay(data, radius) {
  const n = data.length;
  const out = new Float32Array(n);
  for (let i=0; i<n; i++) {
    let sum=0, wsum=0;
    const s=Math.max(0,i-radius), e=Math.min(n-1,i+radius);
    for (let j=s; j<=e; j++) {
      const w = radius>0 ? 1 - Math.abs(j-i)/(radius+1) : 1;
      sum += Math.pow(10, data[j]/20) * w;
      wsum += w;
    }
    const avgLin = wsum>0 ? sum/wsum : 1e-12;
    out[i] = 20*Math.log10(Math.max(avgLin, 1e-12));
  }
  return out;
}

// How many screen pixels one FFT bin currently spans AT A GIVEN
// FREQUENCY, at the current zoom/scale. At the default zoomed-out
// view a bin is only a couple pixels tall, so a few bins' worth of
// smoothing/bleed reads as a pleasingly solid band; pinch-zoomed in,
// that same bin count can span dozens of pixels, making bands look
// bloated and overlapping neighboring harmonics. Scaling the
// smoothing down as this value grows keeps the visual band thickness
// roughly constant on screen regardless of zoom level.
function pixelsPerBinAt(freq, H, binSize) {
  const y1 = freqToY(freq, H);
  const y2 = freqToY(Math.min(viewHi, freq+binSize), H);
  return Math.max(0.01, Math.abs(y1-y2));
}
// Single-value convenience wrapper evaluated at the view's midpoint
// frequency. In LIN mode pixel-per-Hz density is uniform across the
// whole visible range, so this one value is accurate for every row.
// In LOG mode it is NOT uniform (see drawSpectroColumn), so this
// wrapper is only used there as a fallback/reference, not per-row.
function estimatePixelsPerBin(H, binSize) {
  const midFreq = logScale ? Math.sqrt(Math.max(1,viewLo)*Math.max(viewLo+1,viewHi)) : (viewLo+viewHi)/2;
  return pixelsPerBinAt(midFreq, H, binSize);
}

function drawSpectroColumn(binSize) {
  if (!offCanvas||!offCtx) return;
  const W=offCanvas.width, H=offCanvas.height;
  const dpr=window.devicePixelRatio||1;
  const shift=SCROLL_SPD*dpr;
  offCtx.drawImage(offCanvas,-shift,0);
  const colW=Math.ceil(shift)+1, colX=W-colW;
  const img=offCtx.createImageData(colW,H);
  const d=img.data;
  // In LIN mode, pixel-per-Hz density is the same everywhere in the
  // visible range, so one global smoothing radius (from the view's
  // midpoint) is accurate for every row and only needs computing
  // once. In LOG mode, density varies strongly with frequency — the
  // same Hz-wide bin spans far more screen pixels near the bottom of
  // the view than near the top — so using one global radius made the
  // band look thick in the bass and thin in the treble regardless of
  // overall zoom level. Precomputing all three smoothing tiers once
  // per column (cheap: each is a single O(bins) pass) and picking the
  // right one PER ROW, based on that row's own local pixel-per-bin
  // density, keeps the band thickness consistent across the whole
  // register in LOG mode too.
  let dispTiers=null, dispLin=null;
  if (logScale) {
    dispTiers = {
      1: smoothFreqDataForDisplay(fftData, 1),
      2: smoothFreqDataForDisplay(fftData, 2),
      4: smoothFreqDataForDisplay(fftData, SMOOTH_RADIUS)
    };
  } else {
    const ppb = estimatePixelsPerBin(H, binSize);
    const smoothRadius = ppb>8 ? 1 : ppb>4 ? 2 : SMOOTH_RADIUS;
    dispLin = smoothFreqDataForDisplay(fftData, smoothRadius); // 表示専用。ピッチ/ビート検出は元のfftDataを使用
  }
  for (let py=0;py<H;py++) {
    const freq=yToFreq(py,H);
    let disp;
    if (logScale) {
      const ppbLocal = pixelsPerBinAt(freq, H, binSize);
      const r = ppbLocal>8 ? 1 : ppbLocal>4 ? 2 : SMOOTH_RADIUS;
      disp = dispTiers[r];
    } else {
      disp = dispLin;
    }
    // Linear interpolation between the two nearest bins, rather than
    // snapping to the single nearest one, so zooming in reveals a
    // smooth gradient instead of a hard-edged staircase — several
    // consecutive screen rows no longer just repeat the exact same
    // bin's value verbatim when zoomed past the point where one bin
    // spans multiple pixels.
    const fbin=freq/binSize;
    const bin0=Math.floor(fbin), bin1=bin0+1, frac=fbin-bin0;
    const sampleDb=(b)=>(b>=0&&b<disp.length)?disp[b]:-120;
    const dbLo=sampleDb(bin0), dbHi=sampleDb(bin1);
    const db=dbLo+(dbHi-dbLo)*frac;
    const [r,g,b]=dbToRGB(db);
    for (let px=0;px<colW;px++) {
      const i=(py*colW+px)*4;
      d[i]=r;d[i+1]=g;d[i+2]=b;d[i+3]=255;
    }
  }
  offCtx.putImageData(img,colX,0);
  if (currentFreq) {
    for (let h=0;h<NUM_H;h++) {
      const hf=harmonicFreqRefined[h];
      if (!hf||hf<viewLo||hf>viewHi) continue;
      const py=freqToY(hf,H);
      offCtx.strokeStyle="rgba(255,220,0,0.2)";
      offCtx.lineWidth=dpr;
      offCtx.beginPath(); offCtx.moveTo(colX,py); offCtx.lineTo(colX+colW,py); offCtx.stroke();
    }
  }
  spectroCtx.drawImage(offCanvas,0,0);
}

// ── Timeline view: continuous per-harmonic sounding bars ───────────
// H8 lane at the top, H1 at the bottom (matches the spectrogram's
// high-freq-at-top convention). All 8 lanes are always evenly spaced
// (H/8 each), independent of the note's actual pitch — the lane order
// is simply harmonic number 1–8, not frequency. Each bar stays solid
// while the harmonic is continuously sounding (timelineOn); its
// thickness continuously tracks the smoothed level (timelineDbHeld),
// so a beat/warble shows up as an organic thinning-and-thickening of
// the bar rather than an on/off flicker or a hard break.
const TIMELINE_THICK_LO_DB = -60; // level at/below which the bar is drawn at its thinnest
const TIMELINE_THICK_HI_DB = -8;  // level at/above which the bar is drawn at its thickest
const TIMELINE_MIN_FRAC = 0.12;   // thinnest bar, as a fraction of the lane height
const TIMELINE_MAX_FRAC = 0.92;   // thickest bar, as a fraction of the lane height
function drawTimelineColumn() {
  if (!timelineCanvas || !timelineCanvas.width) return;
  const W=timelineCanvas.width, H=timelineCanvas.height;
  const dpr=window.devicePixelRatio||1;
  const shift=SCROLL_SPD*dpr;
  timelineCtx.drawImage(timelineCanvas,-shift,0);
  const colW=Math.ceil(shift)+1, colX=W-colW;
  timelineCtx.fillStyle="#000";
  timelineCtx.fillRect(colX,0,colW,H);
  const laneH = H/NUM_H;
  for (let h=0; h<NUM_H; h++) {
    const rowFromTop = NUM_H-1-h; // H8 at row 0 (top) ... H1 at row NUM_H-1 (bottom)
    const laneTop = rowFromTop*laneH;
    timelineCtx.strokeStyle="rgba(255,255,255,0.06)";
    timelineCtx.lineWidth=dpr;
    timelineCtx.beginPath(); timelineCtx.moveTo(colX,laneTop); timelineCtx.lineTo(colX+colW,laneTop); timelineCtx.stroke();
    if (!timelineOn[h]) continue;
    const t = Math.max(0, Math.min(1, (timelineDbHeld[h]-TIMELINE_THICK_LO_DB)/(TIMELINE_THICK_HI_DB-TIMELINE_THICK_LO_DB)));
    const frac = TIMELINE_MIN_FRAC + t*(TIMELINE_MAX_FRAC-TIMELINE_MIN_FRAC);
    const barH = laneH*frac;
    const barTop = laneTop + (laneH-barH)/2;
    timelineCtx.fillStyle = "rgba(0,220,120,0.92)";
    timelineCtx.fillRect(colX, barTop, colW, Math.max(1,barH));
  }
}

// ── Freq axis labels ───────────────────────────────────────
const freqRulerEl = document.getElementById("freq-ruler");

function updateFreqAxisLabels() {
  const now=Date.now();
  if (now-lastAxisUpdate<300) return;
  lastAxisUpdate=now;
  freqAxisEl.innerHTML="";
  freqRulerEl.innerHTML="";
  // Use whichever canvas is actually visible for the height reference —
  // the hidden one reports clientHeight 0, which previously caused the
  // timeline ruler labels to be positioned against a stale/wrong height
  // (spectroCanvas's, even while it was display:none) and drift out of
  // alignment with the lanes actually drawn on timelineCanvas.
  const H=(viewMode==='timeline' ? timelineCanvas.clientHeight : spectroCanvas.clientHeight)||300;
  if (H<10) return;
  const LABEL_MARGIN = 9; // half label height, roughly — keeps labels from clipping at the edges

  if (viewMode === 'timeline') {
    // Timeline mode: the left ruler shows lane labels H8 (top) .. H1
    // (bottom) instead of a frequency scale — 8 fixed, evenly spaced
    // lanes by harmonic number, independent of the note's actual
    // pitch. No edge-clamping here (unlike the frequency ruler): with
    // a fixed lane grid every label sits exactly at its lane's center.
    const laneH = H/NUM_H;
    for (let h=0; h<NUM_H; h++) {
      const rowFromTop = NUM_H-1-h;
      const y = rowFromTop*laneH + laneH/2;
      const lbl=document.createElement("div");
      lbl.className="ruler-label";
      lbl.style.top=y+"px";
      lbl.textContent="H"+(h+1);
      freqRulerEl.appendChild(lbl);
    }
    return;
  }

  // Left-side ruler: tick + number, independent column outside the graph.
  const grids=[0,20,50,100,200,500,1000,2000,3000,4000,5000,6000,7000,8000,9000,10000];
  grids.forEach(f=>{
    if (f<viewLo||f>viewHi) return;
    const y=freqToY(f,H);
    if (y<0||y>H) return;
    const clampedY = Math.max(LABEL_MARGIN, Math.min(H-LABEL_MARGIN, y));
    const tick=document.createElement("div");
    tick.className="ruler-tick";
    tick.style.top=clampedY+"px";
    freqRulerEl.appendChild(tick);
    const lbl=document.createElement("div");
    lbl.className="ruler-label";
    lbl.style.top=clampedY+"px";
    lbl.textContent=f>=1000?(f/1000)+"kHz":f+"Hz";
    freqRulerEl.appendChild(lbl);
  });

  // In-graph harmonic labels, kept inside the spectrogram area.
  if (showTags && currentFreq) {
    for (let h=0;h<NUM_H;h++) {
      const hf=harmonicFreqRefined[h];
      if (!hf||hf<=viewLo||hf>=viewHi) continue;
      const y=freqToY(hf,H);
      if (y<0||y>H) continue;
      const lbl=document.createElement("div");
      lbl.className="freq-label";
      lbl.style.top=Math.max(LABEL_MARGIN, Math.min(H-LABEL_MARGIN, y))+"px";
      lbl.style.color=selH[h]?"rgba(0,255,85,0.95)":"rgba(255,220,100,0.6)";
      const hfNote=freqToNote(hf);
      lbl.textContent=hfNote ? `H${h+1} ${hfNote.name} ${hf.toFixed(0)}Hz` : `H${h+1} ${hf.toFixed(0)}Hz`;
      freqAxisEl.appendChild(lbl);
    }
  }
}

// ── Beat display ───────────────────────────────────────────
function updateBeatDisplay() {
  let any=false;
  const now=performance.now();
  for (let h=0;h<NUM_H;h++) {
    const on=selH[h], card=beatCards[h];
    const valEl=document.getElementById("bcv"+h);
    const durEl=document.getElementById("bcd"+h);
    const hist=beatHistory[h], st=statusVals[h];
    card.style.display=on?"block":"none";
    if (!on) continue;
    any=true;
    const col=st===2?"#00ff55":st===1?"#ffdd00":"#ff8844";
    card.style.borderColor=st===2?"#00cc44":st===1?"#cc9900":"#333";
    valEl.style.color=col;
    valEl.textContent=hist.length===0?"—":(()=>{
      const avg=hist.reduce((a,v)=>a+v,0)/hist.length;
      return Math.abs(avg)<0.005?"0.00":(avg>0?"+":"")+avg.toFixed(2);
    })();

    // Duration display only applies in Sustain Mode. While the note is
    // actively being timed, show the live elapsed time; once the Stop
    // button freezes it, show the frozen value until the next onset.
    if (!sustainMode) {
      durEl.style.display = "none";
    } else {
      durEl.style.display = "block";
      if (noteIsActive[h] && noteOnsetTime[h]!==null) {
        durEl.textContent = ((now - noteOnsetTime[h])/1000).toFixed(1) + " s";
      } else if (noteDuration[h]!==null) {
        durEl.textContent = noteDuration[h].toFixed(1) + " s";
      } else {
        durEl.textContent = "— s";
      }
    }
  }
  document.getElementById("beat-bar-empty").style.display=any?"none":"block";
}

function toggleH(h) {
  selH[h]=!selH[h];
  hsBtns[h].className="hs-btn"+(selH[h]?" selected":"");
  // Hide GAIN/A4 REF sliders while any harmonic is selected, so the
  // spectrogram keeps maximum vertical space instead of being squeezed.
  const anySelected = selH.some(v=>v);
  document.getElementById("controls").style.display = anySelected ? "none" : "flex";
  // The spectrogram area's available height just changed — re-init the
  // canvas (and its backing buffer) to match, otherwise the newly
  // revealed/hidden space shows as stale black area instead of live data.
  requestAnimationFrame(()=>requestAnimationFrame(()=>initCanvas()));
}

let displayFreqSmoothed = null;
// The cents readout used to repaint every single animation frame
// (~60/sec), which made the number flicker too fast to actually read.
// Internal pitch smoothing still runs every frame (keeps tracking
// responsive), but the visible text now only refreshes twice a
// second, showing the average of everything sampled since the last
// refresh — a stable, readable number instead of a blur.
let noteDisplayBuffer = []; // {freq, cents, name} samples collected since the last visible update
let lastNoteDisplayUpdate = 0;
let lastDisplayedNoteName = null; // detects a genuine note change so it can be shown immediately
const NOTE_DISPLAY_INTERVAL_MS = 500;
function updateNoteDisplay(freq) {
  const nb=document.getElementById("note-big");
  const ns=document.getElementById("note-sub");
  if (freq) {
    // Smooth the displayed frequency so the cents readout doesn't
    // flicker every frame — exponential moving average, ~0.15 weight
    // per frame gives a comfortably readable update pace.
    displayFreqSmoothed = (displayFreqSmoothed===null) ? freq : displayFreqSmoothed + (freq - displayFreqSmoothed)*0.2;
    const note=freqToNote(displayFreqSmoothed);
    if (note) {
      // A genuine note change must show up right away, not wait out
      // the rest of the current 0.5s window blended with leftover
      // samples from the previous note — that made a freshly-struck
      // note look like it was still showing the last one for up to
      // half a second.
      if (note.name !== lastDisplayedNoteName) {
        noteDisplayBuffer = [];
        lastNoteDisplayUpdate = 0;
      }
      noteDisplayBuffer.push({freq:displayFreqSmoothed, cents:note.cents, name:note.name});
      const nowT = performance.now();
      if (nowT - lastNoteDisplayUpdate >= NOTE_DISPLAY_INTERVAL_MS) {
        const avgFreq  = noteDisplayBuffer.reduce((a,v)=>a+v.freq,0)/noteDisplayBuffer.length;
        const avgCents = noteDisplayBuffer.reduce((a,v)=>a+v.cents,0)/noteDisplayBuffer.length;
        // Note name uses the most recent sample in the window, so a
        // note change right at the boundary shows the new name rather
        // than a meaningless blend of two different notes' names.
        const dispName = noteDisplayBuffer[noteDisplayBuffer.length-1].name;
        nb.textContent=dispName; nb.style.color="#fff";
        ns.textContent=`${avgFreq.toFixed(2)} Hz  ${avgCents>=0?"+":""}${avgCents.toFixed(1)}¢`;
        ns.style.color="#aaa";
        lastDisplayedNoteName = dispName;
        noteDisplayBuffer = [];
        lastNoteDisplayUpdate = nowT;
      }
      return;
    }
  } else {
    displayFreqSmoothed = null;
    noteDisplayBuffer = [];
    lastNoteDisplayUpdate = 0;
    lastDisplayedNoteName = null;
  }
  nb.textContent="—"; nb.style.color="#444";
  ns.textContent="— Hz"; ns.style.color="#444";
}

function updateLevel(db) {
  const pct=Math.max(0,Math.min(100,(db+96)/96*100));
  document.getElementById("level-bar").style.width=pct+"%";
  document.getElementById("level-db").textContent=isFinite(db)?db.toFixed(1)+" dB":"— dB";
}

// ── Sound level history strip-chart ─────────────────────────
// Same scrolling technique as the spectrogram: shift the existing
// canvas contents left by one column each frame, then draw a fresh
// bar for the current level at the right edge. Color follows the same
// green→yellow→red progression as the Input Level bar in the header.
function levelToColor(db) {
  const pct = Math.max(0, Math.min(1, (isFinite(db)?db:-96)+96)/96);
  const c0=[0,204,0], c1=[170,170,0], c2=[204,0,0];
  let a,b,t;
  if (pct<0.5) { a=c0; b=c1; t=pct/0.5; } else { a=c1; b=c2; t=(pct-0.5)/0.5; }
  const r=Math.round(a[0]+(b[0]-a[0])*t);
  const g=Math.round(a[1]+(b[1]-a[1])*t);
  const bl=Math.round(a[2]+(b[2]-a[2])*t);
  return `rgb(${r},${g},${bl})`;
}
function drawLevelHistoryColumn(db) {
  if (!levelHistCanvas || !levelHistCanvas.width) return;
  const W=levelHistCanvas.width, H=levelHistCanvas.height;
  const dpr=window.devicePixelRatio||1;
  const shift=SCROLL_SPD*dpr;
  levelHistCtx.drawImage(levelHistCanvas,-shift,0);
  const colW=Math.ceil(shift)+1, colX=W-colW;
  levelHistCtx.fillStyle="#000";
  levelHistCtx.fillRect(colX,0,colW,H);
  // Faint reference gridlines every 24dB (0, -24, -48, -72, -96)
  levelHistCtx.strokeStyle="rgba(255,255,255,0.08)";
  levelHistCtx.lineWidth=dpr;
  for (let g=0; g>=-96; g-=24) {
    const y = H*(1-(g+96)/96);
    levelHistCtx.beginPath(); levelHistCtx.moveTo(colX,y); levelHistCtx.lineTo(colX+colW,y); levelHistCtx.stroke();
  }
  const pct = Math.max(0, Math.min(1, ((isFinite(db)?db:-96)+96)/96));
  const barH = pct*H;
  levelHistCtx.fillStyle = levelToColor(db);
  levelHistCtx.fillRect(colX, H-barH, colW, barH);
}
function updateLevelStats(db) {
  if (!isFinite(db)) return;
  if (levelMin===null || db<levelMin) levelMin=db;
  if (levelMax===null || db>levelMax) levelMax=db;
  levelSum += db; levelCount++;
  document.getElementById("lvl-min").textContent = levelMin.toFixed(1)+" dB";
  document.getElementById("lvl-max").textContent = levelMax.toFixed(1)+" dB";
  document.getElementById("lvl-avg").textContent = (levelSum/levelCount).toFixed(1)+" dB";
}
function resetLevelHistory() {
  levelMin=null; levelMax=null; levelSum=0; levelCount=0;
  document.getElementById("lvl-min").textContent="— dB";
  document.getElementById("lvl-max").textContent="— dB";
  document.getElementById("lvl-avg").textContent="— dB";
  if (levelHistCtx && levelHistCanvas.width) {
    levelHistCtx.fillStyle="#000";
    levelHistCtx.fillRect(0,0,levelHistCanvas.width,levelHistCanvas.height);
  }
}

function resetState() {
  currentFreq=null; pendingFreq=null; pendingCount=0; statusVals=new Array(NUM_H).fill(0);
  beatHistory=Array.from({length:NUM_H},()=>[]); beatNullCount=new Array(NUM_H).fill(0);
  ampEnv=Array.from({length:NUM_H},()=>[]); lastPeakTime=new Array(NUM_H).fill(null); lastBeatRate=new Array(NUM_H).fill(null); noteStartTime=new Array(NUM_H).fill(null); ampNullCount=new Array(NUM_H).fill(0);
  noteDuration=new Array(NUM_H).fill(null); noteIsActive=new Array(NUM_H).fill(false); noteOnsetTime=new Array(NUM_H).fill(null); hysteresisOn=new Array(NUM_H).fill(false); lastTroughDb=new Array(NUM_H).fill(null);
  timelineOn=new Array(NUM_H).fill(false); timelineDbHeld=new Array(NUM_H).fill(-96);
  harmonicFreqRefined=new Array(NUM_H).fill(null);
  viewLo=logScale?10:0; viewHi=4200;
  updateNoteDisplay(null); updateLevel(-Infinity); updateBeatDisplay();
  if (timelineCtx && timelineCanvas.width) { timelineCtx.fillStyle="#000"; timelineCtx.fillRect(0,0,timelineCanvas.width,timelineCanvas.height); }
}

// ── Controls ───────────────────────────────────────────────
document.getElementById("sl-gain").addEventListener("input", function() {
  spectroGain=parseInt(this.value);
  document.getElementById("vl-gain").textContent=spectroGain+" dB";
});

// A4 reference pitch: button-based ±0.1Hz stepper (420–450Hz range,
// 442Hz default), replacing the old slider which was hard to operate precisely.
function setRefPitch(v) {
  let clamped = Math.min(REF_PITCH_MAX, Math.max(REF_PITCH_MIN, v));
  // Round to 1 decimal place to avoid floating-point drift after repeated taps.
  refPitch = Math.round(clamped * 10) / 10;
  document.getElementById("vl-ref").textContent = refPitch.toFixed(1)+" Hz";
}
// (reset button handler is attached below via attachTap, alongside ± buttons,
// so all three share identical touch/mouse handling and none depend on the
// synthetic "click" event — which iOS Safari can suppress once touchend has
// had preventDefault() called on it.)

// Press-and-hold on the ± pitch buttons: after a short delay, repeat
// the step continuously, accelerating (shorter interval) the longer
// the button stays held, so large adjustments don't require dozens of
// individual taps.
// Unified tap/hold handling for the ± / reset pitch buttons. None of
// these rely on the synthetic "click" event — iOS Safari can suppress
// click entirely once touchend has had preventDefault() called on it
// (which we do, deliberately, to block double-tap-to-zoom), so every
// button here fires directly off touchstart/mousedown instead.
//
// holdRepeat=true buttons (± step) repeat continuously while held,
// accelerating over time; holdRepeat=false buttons (reset) fire once
// per press with no repeat.
function attachTap(btnId, stepFn, holdRepeat) {
  const el = document.getElementById(btnId);
  let holdTimeout = null, repeatInterval = null, intervalMs = 0, firedThisPress = false;
  const INITIAL_DELAY = 400;   // ms before repeat kicks in after initial tap
  const START_INTERVAL = 180;  // ms between repeats at the start
  const MIN_INTERVAL = 40;     // fastest repeat rate once fully accelerated
  const ACCEL = 0.85;          // multiply interval by this each repeat until MIN_INTERVAL

  function clearTimers() {
    if (holdTimeout) { clearTimeout(holdTimeout); holdTimeout=null; }
    if (repeatInterval) { clearTimeout(repeatInterval); repeatInterval=null; }
  }
  function scheduleNext() {
    intervalMs = Math.max(MIN_INTERVAL, intervalMs*ACCEL);
    repeatInterval = setTimeout(()=>{ stepFn(); scheduleNext(); }, intervalMs);
  }
  function start(e) {
    e.preventDefault();
    if (firedThisPress) return; // guard against duplicate touchstart+mousedown firing on the same physical tap
    firedThisPress = true;
    clearTimers();
    stepFn(); // immediate first step on press
    if (holdRepeat) {
      intervalMs = START_INTERVAL;
      holdTimeout = setTimeout(()=>{ stepFn(); scheduleNext(); }, INITIAL_DELAY);
    }
  }
  function stop(e) {
    if (e) e.preventDefault();
    clearTimers();
    firedThisPress = false;
  }
  el.addEventListener("touchstart", start, {passive:false});
  el.addEventListener("touchend", stop, {passive:false});
  el.addEventListener("touchcancel", stop, {passive:false});
  // Mouse fallback (desktop browser testing via GitHub Pages)
  el.addEventListener("mousedown", start);
  el.addEventListener("mouseup", stop);
  el.addEventListener("mouseleave", stop);
}
attachTap("btn-ref-down",  ()=>setRefPitch(refPitch - REF_PITCH_STEP), true);
attachTap("btn-ref-up",    ()=>setRefPitch(refPitch + REF_PITCH_STEP), true);
attachTap("btn-ref-reset", ()=>setRefPitch(REF_PITCH_DEFAULT), false);

document.getElementById("tags-toggle").addEventListener("click", function() {
  showTags=!showTags;
  this.style.background=showTags?"#446622":"#333";
  document.getElementById("tags-knob").style.left=showTags?"18px":"2px";
  lastAxisUpdate=0; updateFreqAxisLabels();
});
document.getElementById("scale-toggle").addEventListener("click", function() {
  logScale=!logScale;
  document.getElementById("scale-label").textContent=logScale?"LOG":"LIN";
  this.style.background=logScale?"#2255aa":"#446622";
  document.getElementById("scale-knob").style.left=logScale?"2px":"18px";
  // Reset view range on scale-mode switch so leftover zoom/scroll from
  // the other mode doesn't carry over and confuse the new scale.
  viewLo=logScale?10:0; viewHi=4200;
  if (offCtx&&offCanvas) { offCtx.fillStyle="#000"; offCtx.fillRect(0,0,offCanvas.width,offCanvas.height); }
  lastAxisUpdate=0; updateFreqAxisLabels();
});

// SPEC / TIMELINE view toggle: swaps which canvas is visible and which
// kind of ruler labels are shown. The underlying tracking state for
// the timeline (timelineOn / timelineDbHeld) is always kept up to date
// in the render loop regardless of which view is showing, so switching
// mid-session immediately reflects the current sounding state.
document.getElementById("view-toggle").addEventListener("click", function() {
  viewMode = viewMode==='spec' ? 'timeline' : 'spec';
  document.getElementById("view-label").textContent = viewMode==='spec' ? "SPEC" : "TIMELINE";
  this.style.background = viewMode==='timeline' ? "#2255aa" : "#446622";
  document.getElementById("view-knob").style.left = viewMode==='timeline' ? "18px" : "2px";
  spectroCanvas.style.display  = viewMode==='spec'     ? "block" : "none";
  timelineCanvas.style.display = viewMode==='timeline' ? "block" : "none";
  if (viewMode==='timeline') initTimelineCanvas();
  lastAxisUpdate=0; updateFreqAxisLabels();
});

// Sustain Mode: OFF by default — duration tracking/display fully hidden.
// ON — onset is auto-detected (ONSET_DB_THRESHOLD), but the elapsed
// time is only frozen when the person taps the Stop button (manual,
// since deciding "the sound has died out" is a judgment call better
// left to the ear than a fixed dB floor).
document.getElementById("sustain-toggle").addEventListener("click", function() {
  sustainMode = !sustainMode;
  this.style.background = sustainMode ? "#2255aa" : "#333";
  document.getElementById("sustain-knob").style.left = sustainMode ? "18px" : "2px";
  document.getElementById("btn-sustain-stop").style.display = sustainMode ? "inline-block" : "none";
  if (!sustainMode) {
    // Turning sustain mode off clears all in-progress/frozen timers so
    // nothing stale is waiting when it's turned back on later.
    noteIsActive = new Array(NUM_H).fill(false);
    noteOnsetTime = new Array(NUM_H).fill(null);
    noteDuration = new Array(NUM_H).fill(null);
    hysteresisOn = new Array(NUM_H).fill(false);
  }
  updateBeatDisplay();
});

// Manual Stop: freezes the elapsed duration for every harmonic
// currently being timed, and re-arms onset detection for the next note.
document.getElementById("btn-sustain-stop").addEventListener("click", function() {
  const now = performance.now();
  for (let h=0; h<NUM_H; h++) {
    if (noteIsActive[h] && noteOnsetTime[h]!==null) {
      noteDuration[h] = (now - noteOnsetTime[h]) / 1000;
    }
    noteIsActive[h] = false;
    noteOnsetTime[h] = null;
    hysteresisOn[h] = false;
  }
  updateBeatDisplay();
});
</script>
